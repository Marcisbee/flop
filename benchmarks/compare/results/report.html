<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flop Benchmark Report</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;500;600&display=swap");

      :root {
        --bg: #f4f1e8;
        --surface: #fffdf8;
        --surface-strong: #ffffff;
        --line: #d8d1c2;
        --line-strong: #b4aa94;
        --ink: #1f2430;
        --muted: #6b6f79;
        --accent: #1f4db8;
        --shadow: 0 14px 34px rgba(42, 38, 29, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
      }
      body {
        margin: 0;
        background:
          radial-gradient(
            circle at 10% -20%,
            #ffffff 0%,
            transparent 46%
          ),
          radial-gradient(circle at 90% -15%, #e8efff 0%, transparent 42%),
          repeating-linear-gradient(
          90deg,
          transparent 0 18px,
          rgba(49, 63, 92, 0.025) 18px 19px
        ),
          var(--bg);
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 28px 22px 38px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 2.5vw, 2.5rem);
        letter-spacing: -0.03em;
        line-height: 1;
        font-family: "Fraunces", "Georgia", serif;
        font-weight: 700;
      }
      .sub {
        margin: 10px 0 18px;
        color: var(--muted);
        font-size: 14px;
        max-width: 760px;
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 9px;
        flex-wrap: wrap;
        margin-bottom: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px;
        box-shadow: var(--shadow);
      }
      .bar button,
      .bar input[type="file"] {
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--surface-strong);
        color: var(--ink);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        padding: 9px 12px;
      }
      .bar button {
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      .bar button:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 14px rgba(31, 77, 184, 0.16);
      }
      .status {
        color: var(--muted);
        font-size: 12px;
        font-family: "IBM Plex Mono", monospace;
      }
      code {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.92em;
        background: #f2efe7;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 1px 5px;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }
      .top {
        margin-bottom: 14px;
      }
      .card {
        position: relative;
        background: linear-gradient(180deg, #fffefb, #fdfaf1);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: rise-in 280ms ease both;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 4px;
        background: linear-gradient(180deg, #1f4db8, #5a89ed);
        opacity: 0.8;
      }
      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 12px;
      }
      .title {
        margin: 0;
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        letter-spacing: -0.02em;
        line-height: 1.1;
        font-family: "Fraunces", "Georgia", serif;
        font-weight: 700;
      }
      .meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
        font-family: "IBM Plex Mono", monospace;
      }
      .expand {
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #f8f3e7;
        padding: 6px 11px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: background 130ms ease, transform 130ms ease;
      }
      .expand:hover {
        background: #efe6d2;
        transform: translateY(-1px);
      }
      .mini-chart {
        width: 100%;
        height: 142px;
        display: block;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, #ffffff, #f2f6ff);
      }
      .legend {
        margin-top: 10px;
        display: grid;
        gap: 6px;
      }
      .legend-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        border-radius: 8px;
        padding: 5px 7px;
        border: 1px solid transparent;
      }
      .legend-row.engine-link {
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease;
      }
      .legend-row.engine-link:hover {
        background: #eef3ff;
        border-color: #d3dcf5;
      }
      .legend-row.engine-link.is-active {
        background: #e4edff;
        border-color: #bbcef8;
      }
      .left {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .left span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .value {
        color: #2d3650;
        font-variant-numeric: tabular-nums;
        font-family: "IBM Plex Mono", monospace;
        white-space: nowrap;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 99px;
        flex-shrink: 0;
        border: 1px solid rgba(12, 18, 32, 0.22);
      }
      .empty {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 14px;
        color: var(--muted);
        background: #faf6eb;
      }
      .overall-chart {
        margin-top: 8px;
        overflow-x: auto;
      }
      .overall-svg {
        display: block;
        width: 100%;
        min-width: 920px;
        border-radius: 11px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, #ffffff, #f6f8fc);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }
      @media (max-width: 760px) {
        .overall-svg {
          min-width: 780px;
        }
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(26, 27, 33, 0.48);
        backdrop-filter: blur(2px);
      }
      .modal.show {
        display: flex;
      }
      .modal-card {
        width: min(1120px, 100%);
        max-height: 92vh;
        overflow: auto;
        background: #fffefb;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 28px 58px rgba(15, 15, 19, 0.22);
      }
      .modal-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .modal-title {
        margin: 0;
        font-size: clamp(1.1rem, 2.2vw, 1.45rem);
        font-family: "Fraunces", "Georgia", serif;
      }
      .close {
        border: 1px solid var(--line-strong);
        border-radius: 9px;
        background: #f8f3e7;
        padding: 8px 10px;
        cursor: pointer;
        font-weight: 600;
      }
      .detail-chart {
        width: 100%;
        height: 360px;
        display: block;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, #fff, #f2f6ff);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: #fffefb;
      }
      th,
      td {
        padding: 10px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        text-align: left;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        background: #f4efe3;
        font-family: "IBM Plex Mono", monospace;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr.engine-row {
        transition: background 120ms ease;
      }
      tr.engine-row:hover {
        background: #f2f6ff;
      }
      tr.engine-row.is-active {
        background: #e1ecff;
      }
      th.num,
      td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-family: "IBM Plex Mono", monospace;
      }

      @keyframes rise-in {
        from {
          transform: translateY(6px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @media (max-width: 720px) {
        .wrap {
          padding: 20px 14px 26px;
        }
        .bar {
          padding: 8px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .card {
          padding: 12px;
        }
        .mini-chart {
          height: 130px;
        }
        .detail-chart {
          height: 300px;
        }
      }

  <body>
    <div class="wrap">
      <h1>Benchmark Report</h1>
      <p class="sub">
        All scenarios are shown at once. Click <code>Expand</code> for full
        chart and details.
      </p>

      <div class="bar">
        <button id="reloadBtn">Reload</button>
        <input id="fileInput" type="file" accept="application/json" />
        <span id="status" class="status">Loading history...</span>
      </div>

      <section id="overallCard" class="card top"></section>

      <div id="cards" class="grid"></div>
    </div>

    <div id="modal" class="modal">
      <div class="modal-card">
        <div class="modal-top">
          <h2 id="modalTitle" class="modal-title">Scenario</h2>
          <button id="closeBtn" class="close">Close</button>
        </div>
        <svg
          id="detailChart"
          class="detail-chart"
          viewBox="0 0 1120 360"
          preserveAspectRatio="none"
        >
        </svg>
        <table id="detailTable"></table>
      </div>
    </div>

    <script>
      const COLORS = {
        "flop-ts": "#5db39c",
        "flop-go": "#b56ad0",
        "sqlite-ts": "#4f7de0",
        "sqlite-go": "#e08545",
        "turso-ts": "#d14f73",
        "pglite-ts": "#4ea85f",
        "turso-go": "#d9a93b",
        "mongodb-ts": "#3f8d4a",
        "mongodb-go": "#7dcf5f",
      };
      const ENGINES = [
        "flop-ts",
        "flop-go",
        "sqlite-ts",
        "sqlite-go",
        "turso-ts",
        "pglite-ts",
        "turso-go",
        "mongodb-ts",
        "mongodb-go",
      ];
      let history = { runs: [] };

      function metricForKind(kind) {
        if (kind === "reads") {
          return { key: "readOpsPerSec", label: "Read ops/s" };
        }
        if (kind === "writes") {
          return { key: "writeOpsPerSec", label: "Write ops/s" };
        }
        if (kind === "edits") {
          return {
            key: "transferOpsPerSec",
            label: "Edit transfer ops/s",
          };
        }
        return { key: "opsPerSec", label: "Ops/s" };
      }

      function fmt(v) {
        if (v == null || Number.isNaN(v)) return "-";
        return Math.round(v).toLocaleString();
      }

      function average(values) {
        if (!values.length) return null;
        return values.reduce((a, b) => a + b, 0) / values.length;
      }

      function lastScore(values) {
        if (!values.length) return null;
        const v = values[values.length - 1];
        return typeof v === "number" ? v : null;
      }

      function engineOrderForSeries(series) {
        return [...ENGINES].sort((a, b) => {
          const aLast = lastScore(series[a] || []);
          const bLast = lastScore(series[b] || []);
          const aHasLast = typeof aLast === "number";
          const bHasLast = typeof bLast === "number";

          if (aHasLast && bHasLast && aLast !== bLast) {
            return bLast - aLast;
          }
          if (aHasLast !== bHasLast) return aHasLast ? -1 : 1;

          const aAvg = average((series[a] || []).filter((v) =>
            v != null
          )) ??
            -Infinity;
          const bAvg =
            average((series[b] || []).filter((v) => v != null)) ??
              -Infinity;
          if (aAvg !== bAvg) return bAvg - aAvg;

          return ENGINES.indexOf(a) - ENGINES.indexOf(b);
        });
      }

      function scenarioNames() {
        const set = new Set();
        const out = [];
        const latest = history.runs?.[0];
        for (const s of latest?.scenarios || []) {
          if (
            ["reads", "writes", "edits", "mixed"].includes(
              s?.config?.kind,
            ) && !set.has(s.name)
          ) {
            set.add(s.name);
            out.push(s.name);
          }
        }
        for (const run of history.runs || []) {
          for (const s of run.scenarios || []) {
            if (
              ["reads", "writes", "edits", "mixed"].includes(
                s?.config?.kind,
              ) && !set.has(s.name)
            ) {
              set.add(s.name);
              out.push(s.name);
            }
          }
        }
        return out;
      }

      function scenarioFromRun(run, name) {
        return (run.scenarios || []).find((s) => s.name === name) ||
          null;
      }

      function runsForScenario(name) {
        return [...(history.runs || [])]
          .filter((run) =>
            (run.scenarios || []).some((s) => s.name === name)
          )
          .sort((a, b) =>
            +new Date(a.createdAt) - +new Date(b.createdAt)
          );
      }

      function collectScenario(name) {
        const runs = runsForScenario(name);
        const scenarios = runs.map((run) => scenarioFromRun(run, name));
        const sample = scenarios.find(Boolean);
        const metric = metricForKind(sample?.config?.kind);

        const series = {};
        const memorySeries = {};
        const peakSeries = {};
        const efficiencySeries = {};
        for (const engine of ENGINES) {
          series[engine] = scenarios.map((s) => {
            const result = (s?.results || []).find((r) =>
              r.engine === engine
            );
            const w = result?.ok ? result?.metrics?.workload : null;
            const v = w?.[metric.key];
            return typeof v === "number" ? v : null;
          });
          memorySeries[engine] = scenarios.map((s) => {
            const result = (s?.results || []).find((r) =>
              r.engine === engine
            );
            const v = result?.memory?.rssAvgMB;
            return typeof v === "number" ? v : null;
          });
          peakSeries[engine] = scenarios.map((s) => {
            const result = (s?.results || []).find((r) =>
              r.engine === engine
            );
            const v = result?.memory?.rssPeakMB;
            return typeof v === "number" ? v : null;
          });
          efficiencySeries[engine] = scenarios.map((s) => {
            const result = (s?.results || []).find((r) =>
              r.engine === engine
            );
            const v = result?.memory?.opsPerSecPerAvgMB;
            return typeof v === "number" ? v : null;
          });
        }

        return {
          runs,
          scenarios,
          metric,
          series,
          memorySeries,
          peakSeries,
          efficiencySeries,
          engineOrder: engineOrderForSeries(series),
        };
      }

      function collectLatestOverall() {
        const run = history.runs?.[0];
        if (!run) return null;

        const scoreSum = {};
        const scoreCount = {};
        let scenarioCount = 0;

        for (const scenario of run.scenarios || []) {
          if (
            !["reads", "writes", "edits", "mixed"].includes(
              scenario?.config?.kind,
            )
          ) {
            continue;
          }
          const metric = metricForKind(scenario?.config?.kind);
          const values = [];
          for (const result of scenario.results || []) {
            if (!result?.ok) continue;
            const v = result?.metrics?.workload?.[metric.key];
            if (typeof v === "number" && Number.isFinite(v) && v > 0) {
              values.push([result.engine, v]);
            }
          }
          if (!values.length) continue;

          scenarioCount++;
          const best = Math.max(...values.map(([, v]) => v));
          if (!(best > 0)) continue;

          for (const [engine, v] of values) {
            scoreSum[engine] = (scoreSum[engine] ?? 0) +
              (v / best) * 100;
            scoreCount[engine] = (scoreCount[engine] ?? 0) + 1;
          }
        }

        const rows = ENGINES.map((engine) => {
          const count = scoreCount[engine] ?? 0;
          const score = count > 0 ? scoreSum[engine] / count : null;
          return {
            engine,
            score,
            coverage: count,
          };
        }).filter((x) => x.score != null).sort((a, b) =>
          b.score - a.score
        );

        return {
          run,
          scenarioCount,
          rows,
        };
      }

      function overallChartSvg(rows, scenarioCount) {
        const width = 1080;
        const rowHeight = 34;
        const pad = { l: 210, r: 140, t: 16, b: 32 };
        const chartWidth = width - pad.l - pad.r;
        const height = pad.t + pad.b + rows.length * rowHeight;
        const x = (value) =>
          pad.l +
          (Math.max(0, Math.min(100, value)) / 100) * chartWidth;
        const ticks = [0, 25, 50, 75, 100];

        let svg = "";

        for (const t of ticks) {
          const xx = x(t);
          svg += `<line x1="${xx}" y1="${pad.t}" x2="${xx}" y2="${
            height - pad.b
          }" stroke="${
            t === 0 ? "#9aa6bf" : "#d8dee8"
          }" stroke-width="1" stroke-dasharray="${
            t === 0 ? "0" : "3 5"
          }"/>`;
          svg += `<text x="${xx}" y="${
            height - 10
          }" text-anchor="middle" fill="#6b7280" font-size="10" font-family="'IBM Plex Mono', monospace">${t}</text>`;
        }

        rows.forEach((row, index) => {
          const yc = pad.t + index * rowHeight + rowHeight / 2;
          const barY = yc - 8;
          const barWidth = Math.max(2, x(row.score) - x(0));
          const rank = index + 1;
          const coverage = `${row.coverage}/${scenarioCount}`;

          svg += `<rect x="${
            x(0)
          }" y="${barY}" width="${chartWidth}" height="16" fill="#edf2f8"/>`;
          svg += `<rect x="${
            x(0)
          }" y="${barY}" width="${barWidth}" height="16" fill="${
            COLORS[row.engine]
          }" />`;

          svg += `<text x="40" y="${
            yc + 4
          }" text-anchor="end" fill="#7a8294" font-size="11" font-family="'IBM Plex Mono', monospace">#${rank}</text>`;
          svg += `<circle cx="54" cy="${yc}" r="5" fill="${
            COLORS[row.engine]
          }" stroke="rgba(12,18,32,0.2)" stroke-width="1"/>`;
          svg += `<text x="66" y="${
            yc + 4
          }" fill="#1f2430" font-size="12" font-weight="600" font-family="'IBM Plex Mono', monospace">${row.engine}</text>`;

          svg += `<text x="${width - 88}" y="${
            yc + 4
          }" text-anchor="end" fill="#1f2430" font-size="12" font-family="'IBM Plex Mono', monospace">${
            row.score.toFixed(1)
          }</text>`;
          svg += `<text x="${width - 12}" y="${
            yc + 4
          }" text-anchor="end" fill="#7a8294" font-size="11" font-family="'IBM Plex Mono', monospace">${coverage}</text>`;
        });

        return `<svg class="overall-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMinYMin meet">${svg}</svg>`;
      }

      function renderOverall() {
        const container = document.getElementById("overallCard");
        const data = collectLatestOverall();

        if (!data || !data.rows.length) {
          container.innerHTML = `
            <div class="card-head">
              <div>
                <h3 class="title">Overall Score</h3>
                <div class="meta">Latest run (normalized)</div>
              </div>
            </div>
            <div class="empty">No successful latest-run scenario data yet.</div>
          `;
          return;
        }

        const created = new Date(data.run.createdAt).toLocaleString();
        const chart = overallChartSvg(data.rows, data.scenarioCount);

        container.innerHTML = `
          <div class="card-head">
            <div>
              <h3 class="title">Overall Score</h3>
              <div class="meta">Latest run · ${created}</div>
            </div>
          </div>
          <div class="overall-chart">
            ${chart}
          </div>
          <div class="meta">
            Score = average of (engine scenario score / best scenario score) × 100. Axis is normalized 0-100, higher is better.
          </div>
        `;
      }

      function drawChart(svg, runs, series, cfg) {
        const width = cfg.width;
        const height = cfg.height;
        const pad = cfg.pad;
        const activeEngine = ENGINES.includes(cfg.activeEngine)
          ? cfg.activeEngine
          : null;
        const engineOrder = Array.isArray(cfg.engineOrder) &&
            cfg.engineOrder.length
          ? cfg.engineOrder
          : ENGINES;

        const values = Object.values(series).flat().filter((v) =>
          v != null
        );
        if (!runs.length || !values.length) {
          svg.innerHTML =
            `<text x="16" y="24" fill="#6a7488" font-size="12">No data</text>`;
          return;
        }

        let min = Math.min(...values);
        let max = Math.max(...values);
        if (min === max) {
          min = min * 0.9;
          max = max * 1.1;
        }
        const range = Math.max(1e-9, max - min);

        const xCount = runs.length;
        const plotWidth = width - pad.l - pad.r;
        const x = (i) => {
          if (xCount <= 1) return pad.l + plotWidth / 2;
          return pad.l + (i * plotWidth) / Math.max(1, xCount - 1);
        };
        const y = (v) =>
          pad.t + ((max - v) * (height - pad.t - pad.b)) / range;

        let html = "";

        if (cfg.axes) {
          for (let i = 0; i <= 4; i++) {
            const yy = pad.t + ((height - pad.t - pad.b) * i) / 4;
            const vv = max - ((max - min) * i) / 4;
            html += `<line x1="${pad.l}" y1="${yy}" x2="${
              width - pad.r
            }" y2="${yy}" stroke="#d8dee8" stroke-width="1"/>`;
            html += `<text x="8" y="${
              yy + 4
            }" fill="#6a7488" font-size="11">${fmt(vv)}</text>`;
          }
          html += `<line x1="${pad.l}" y1="${height - pad.b}" x2="${
            width - pad.r
          }" y2="${height - pad.b}" stroke="#ced6e2"/>`;

          runs.forEach((run, i) => {
            if (runs.length > 12 && i % 2 === 1) return;
            const label = new Date(run.createdAt).toLocaleDateString(
              undefined,
              { month: "short", day: "numeric" },
            );
            html += `<text x="${x(i)}" y="${
              height - 12
            }" text-anchor="middle" fill="#6a7488" font-size="11">${label}</text>`;
          });
        }

        for (const engine of engineOrder) {
          const pts = series[engine].map((v, i) => ({ v, i })).filter((
            p,
          ) => p.v != null);
          if (!pts.length) continue;
          const isActive = !activeEngine || activeEngine === engine;
          const strokeWidth = activeEngine ? (isActive ? 3 : 1.4) : 2;
          const strokeOpacity = activeEngine
            ? (isActive ? 1 : 0.18)
            : 0.95;

          if (xCount === 1 && pts.length === 1) {
            const yy = y(pts[0].v);
            html += `<line x1="${pad.l}" y1="${yy}" x2="${
              width - pad.r
            }" y2="${yy}" stroke="${
              COLORS[engine]
            }" stroke-width="${strokeWidth}" stroke-opacity="${strokeOpacity}" stroke-linecap="round"/>`;
          } else {
            const d = pts.map((p, idx) =>
              `${idx === 0 ? "M" : "L"}${x(p.i)},${y(p.v)}`
            ).join(" ");
            html += `<path d="${d}" fill="none" stroke="${
              COLORS[engine]
            }" stroke-width="${strokeWidth}" stroke-opacity="${strokeOpacity}" stroke-linecap="round"/>`;
          }

          if (cfg.points) {
            for (const p of pts) {
              html += `<circle cx="${x(p.i)}" cy="${y(p.v)}" r="${
                activeEngine ? (isActive ? 4 : 2.6) : 3
              }" fill="${COLORS[engine]}" fill-opacity="${
                activeEngine ? (isActive ? 1 : 0.22) : 0.95
              }"/>`;
            }
          }
        }

        svg.innerHTML = html;
      }

      function renderMiniChart(name, activeEngine = null) {
        const svg = document.querySelector(`svg[data-mini="${name}"]`);
        if (!svg) return;
        const data = collectScenario(name);
        drawChart(svg, data.runs, data.series, {
          width: 420,
          height: 142,
          pad: { l: 10, r: 10, t: 8, b: 8 },
          axes: false,
          points: false,
          activeEngine,
          engineOrder: data.engineOrder,
        });
      }

      function setMiniLegendActive(
        container,
        scenarioName,
        activeEngine,
      ) {
        const rows = container.querySelectorAll(
          `.legend-row.engine-link[data-scenario="${scenarioName}"]`,
        );
        rows.forEach((row) => {
          row.classList.toggle(
            "is-active",
            !!activeEngine && row.dataset.engine === activeEngine,
          );
        });
      }

      function bindMiniLegendInteractions(container) {
        container.querySelectorAll(".legend-row.engine-link").forEach(
          (row) => {
            const scenarioName = row.dataset.scenario;
            const engine = row.dataset.engine;
            if (!scenarioName || !engine) return;

            const activate = () => {
              setMiniLegendActive(container, scenarioName, engine);
              renderMiniChart(scenarioName, engine);
            };
            const deactivate = () => {
              setMiniLegendActive(container, scenarioName, null);
              renderMiniChart(scenarioName, null);
            };

            row.addEventListener("mouseenter", activate);
            row.addEventListener("focus", activate);
            row.addEventListener("mouseleave", deactivate);
            row.addEventListener("blur", deactivate);
          },
        );
      }

      function renderCards() {
        const container = document.getElementById("cards");
        renderOverall();
        const names = scenarioNames();

        if (!names.length) {
          container.innerHTML =
            `<div class="empty">No benchmark runs yet. Run <code>deno task bench</code>.</div>`;
          return;
        }

        container.innerHTML = names.map((name) => {
          const data = collectScenario(name);
          const runCount = data.runs.length;

          const legend = data.engineOrder
            .map((engine) => {
              const vals = data.series[engine].filter((v) => v != null);
              const memVals = data.memorySeries[engine].filter((v) =>
                v != null
              );
              const peakVals = data.peakSeries[engine].filter((v) =>
                v != null
              );
              const effVals = data.efficiencySeries[engine].filter((
                v,
              ) => v != null);
              return {
                engine,
                avg: average(vals),
                avgMem: average(memVals),
                avgPeak: average(peakVals),
                avgEff: average(effVals),
                has: vals.length > 0,
              };
            })
            .filter((x) => x.has)
            .map((x) => `
        <div class="legend-row engine-link" data-scenario="${name}" data-engine="${x.engine}" tabindex="0">
          <span class="left"><i class="dot" style="background:${
              COLORS[x.engine]
            }"></i><span>${x.engine}</span></span>
          <span class="value">Avg ${fmt(x.avg)} ${data.metric.label}${
              x.avgMem != null ? ` · ${fmt(x.avgMem)} MB` : ""
            }${
              x.avgPeak != null ? ` · Peak ${fmt(x.avgPeak)} MB` : ""
            }${
              x.avgEff != null ? ` · ${fmt(x.avgEff)} ops/s/MB` : ""
            }</span>
        </div>
      `)
            .join("");

          return `
      <article class="card" data-name="${name}">
        <div class="card-head">
          <div>
            <h3 class="title">${name}</h3>
            <div class="meta">${data.metric.label} · ${runCount} run${
            runCount === 1 ? "" : "s"
          }</div>
          </div>
          <button class="expand" data-expand="${name}">Expand</button>
        </div>
        <svg class="mini-chart" data-mini="${name}" viewBox="0 0 420 142" preserveAspectRatio="none"></svg>
        <div class="legend">${
            legend || `<div class="meta">No successful runs yet</div>`
          }</div>
      </article>
    `;
        }).join("");

        for (const name of names) {
          renderMiniChart(name);
        }
        bindMiniLegendInteractions(container);

        container.querySelectorAll("[data-expand]").forEach((el) => {
          el.addEventListener("click", (ev) => {
            const name = ev.currentTarget.getAttribute("data-expand");
            openDetail(name);
          });
        });
      }

      function openDetail(name) {
        if (!name) return;

        const data = collectScenario(name);
        document.getElementById("modalTitle").textContent =
          `${name} · ${data.metric.label}`;

        renderDetailChart(name, null);

        const rows = data.engineOrder.map((engine) => {
          const vals = data.series[engine].filter((v) => v != null);
          const memVals = data.memorySeries[engine].filter((v) =>
            v != null
          );
          const peakVals = data.peakSeries[engine].filter((v) =>
            v != null
          );
          const effVals = data.efficiencySeries[engine].filter((v) =>
            v != null
          );
          if (!vals.length) {
            return `
        <tr class="engine-row" data-engine="${engine}" tabindex="0">
          <td><span class="left"><i class="dot" style="background:${
              COLORS[engine]
            }"></i><span>${engine}</span></span></td>
          <td class="num">-</td>
          <td class="num">-</td>
          <td class="num">-</td>
          <td class="num">-</td>
          <td class="num">-</td>
          <td class="num">-</td>
          <td class="num">-</td>
        </tr>
      `;
          }

          const min = Math.min(...vals);
          const max = Math.max(...vals);
          const avg = average(vals);
          const latest = vals[vals.length - 1];
          const avgMem = average(memVals);
          const avgPeak = average(peakVals);
          const avgEff = average(effVals);

          return `
      <tr class="engine-row" data-engine="${engine}" tabindex="0">
        <td><span class="left"><i class="dot" style="background:${
            COLORS[engine]
          }"></i><span>${engine}</span></span></td>
        <td class="num">${fmt(min)}</td>
        <td class="num">${fmt(max)}</td>
        <td class="num">${fmt(avg)}</td>
        <td class="num">${fmt(latest)}</td>
        <td class="num">${fmt(avgMem)}</td>
        <td class="num">${fmt(avgPeak)}</td>
        <td class="num">${fmt(avgEff)}</td>
      </tr>
    `;
        }).join("");

        document.getElementById("detailTable").innerHTML = `
    <thead>
      <tr>
        <th>Engine</th>
        <th class="num">Min (${data.metric.label})</th>
        <th class="num">Max (${data.metric.label})</th>
        <th class="num">Avg (${data.metric.label})</th>
        <th class="num">Latest (${data.metric.label})</th>
        <th class="num">Avg RSS (MB)</th>
        <th class="num">Avg Peak RSS (MB)</th>
        <th class="num">Avg Eff (ops/s/MB)</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  `;
        bindDetailRowInteractions(name);

        document.getElementById("modal").classList.add("show");
      }

      function renderDetailChart(name, activeEngine = null) {
        const data = collectScenario(name);
        const chart = document.getElementById("detailChart");
        drawChart(chart, data.runs, data.series, {
          width: 1120,
          height: 360,
          pad: { l: 56, r: 20, t: 16, b: 42 },
          axes: true,
          points: true,
          activeEngine,
          engineOrder: data.engineOrder,
        });
      }

      function setDetailRowActive(activeEngine) {
        document.querySelectorAll("#detailTable tbody tr.engine-row")
          .forEach(
            (row) => {
              row.classList.toggle(
                "is-active",
                !!activeEngine && row.dataset.engine === activeEngine,
              );
            },
          );
      }

      function bindDetailRowInteractions(name) {
        document.querySelectorAll("#detailTable tbody tr.engine-row")
          .forEach(
            (row) => {
              const engine = row.dataset.engine;
              if (!engine) return;

              const activate = () => {
                setDetailRowActive(engine);
                renderDetailChart(name, engine);
              };
              const deactivate = () => {
                setDetailRowActive(null);
                renderDetailChart(name, null);
              };

              row.addEventListener("mouseenter", activate);
              row.addEventListener("focus", activate);
              row.addEventListener("mouseleave", deactivate);
              row.addEventListener("blur", deactivate);
            },
          );
      }

      function closeDetail() {
        document.getElementById("modal").classList.remove("show");
      }

      function setStatus(text) {
        document.getElementById("status").textContent = text;
      }

      async function loadHistory() {
        if (window.__BENCH_HISTORY__?.runs?.length) {
          history = window.__BENCH_HISTORY__;
          setStatus(`Loaded ${history.runs.length} runs (embedded)`);
          renderCards();
          return;
        }

        setStatus("Loading history...");
        try {
          const res = await fetch("../results/history.json", {
            cache: "no-store",
          });
          if (!res.ok) throw new Error(`${res.status}`);
          history = await res.json();
          setStatus(`Loaded ${history.runs?.length || 0} runs`);
          renderCards();
        } catch (err) {
          history = { runs: [] };
          setStatus(
            `Fetch failed (${err}). Load history.json manually.`,
          );
          renderCards();
        }
      }

      function bindUI() {
        document.getElementById("reloadBtn").addEventListener(
          "click",
          loadHistory,
        );
        document.getElementById("closeBtn").addEventListener(
          "click",
          closeDetail,
        );
        document.getElementById("modal").addEventListener(
          "click",
          (ev) => {
            if (ev.target.id === "modal") closeDetail();
          },
        );
        document.getElementById("fileInput").addEventListener(
          "change",
          async (ev) => {
            const f = ev.target.files?.[0];
            if (!f) return;
            const raw = await f.text();
            history = JSON.parse(raw);
            setStatus(
              `Loaded ${history.runs?.length || 0} runs from ${f.name}`,
            );
            renderCards();
          },
        );
        window.addEventListener("keydown", (ev) => {
          if (ev.key === "Escape") closeDetail();
        });
      }

      bindUI();
      loadHistory();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flop Admin</title>
<style>
:root {
  --accent: #0078d4;
  --accent-hover: #006cbd;
  --error: #f48771;

  /* Dark theme (default) */
  --bg: #1e1e1e;
  --bg-surface: #252526;
  --bg-hover: #2a2d2e;
  --bg-active: #37373d;
  --bg-input: #3c3c3c;
  --border: #3c3c3c;
  --border-input: #4a4a4a;
  --text: #cccccc;
  --text-heading: #ffffff;
  --text-muted: #999999;
  --text-faint: #888888;
  --text-dimmed: #666666;
  --text-ghost: #555555;
  --row-border: #2a2a2a;
  --danger: #cc6666;
  --danger-hover-bg: #2d1f1f;
  --danger-hover-text: #f48771;
  --scrollbar-thumb: #424242;
  --scrollbar-thumb-hover: #4a4a4a;
}

@media (prefers-color-scheme: light) {
  :root {
    --accent: #0078d4;
    --accent-hover: #106ebe;
    --error: #d32f2f;

    --bg: #f3f3f3;
    --bg-surface: #ffffff;
    --bg-hover: #e8e8e8;
    --bg-active: #d6ebff;
    --bg-input: #ffffff;
    --border: #e0e0e0;
    --border-input: #cecece;
    --text: #333333;
    --text-heading: #1e1e1e;
    --text-muted: #666666;
    --text-faint: #888888;
    --text-dimmed: #999999;
    --text-ghost: #aaaaaa;
    --row-border: #f0f0f0;
    --danger: #d32f2f;
    --danger-hover-bg: #fdecea;
    --danger-hover-text: #c62828;
    --scrollbar-thumb: #c1c1c1;
    --scrollbar-thumb-hover: #a8a8a8;
  }
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow:hidden}
#app{display:flex;height:100vh;width:100vw}

/* Sidebar */
.sidebar{width:240px;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;user-select:none}
.sidebar-header{padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid var(--border)}
.logo-sm{display:flex;align-items:center;gap:8px;color:var(--text);font-size:15px;font-weight:600}
.logo-sm svg{color:var(--accent)}
.sidebar-section-label{padding:8px 16px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-faint)}
.sidebar-tables{flex:1;overflow-y:auto;padding:4px 8px}
.sidebar-item{display:flex;align-items:center;width:100%;padding:5px 8px;background:none;border:none;border-radius:4px;color:var(--text);font-size:13px;cursor:pointer;gap:6px;text-align:left}
.sidebar-item:hover{background:var(--bg-hover)}
.sidebar-item.active{background:var(--bg-active);color:var(--text-heading)}
.sidebar-item-icon{color:var(--text-faint);display:flex;flex-shrink:0}
.sidebar-item.active .sidebar-item-icon{color:var(--text)}
.sidebar-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-item-count{color:var(--text-dimmed);font-size:11px;font-variant-numeric:tabular-nums}
.sidebar-item.active .sidebar-item-count{color:var(--text-muted)}
.sidebar-footer{border-top:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:2px}
.sidebar-action{display:flex;align-items:center;gap:6px;padding:5px 8px;background:none;border:none;border-radius:4px;color:var(--text-muted);font-size:12px;cursor:pointer;text-align:left}
.sidebar-action:hover{background:var(--bg-hover);color:var(--text)}
.sidebar-action.danger{color:var(--danger)}
.sidebar-action.danger:hover{background:var(--danger-hover-bg);color:var(--danger-hover-text)}

/* Main content */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-dimmed)}
.empty-icon{opacity:0.3}
.empty-icon svg{width:48px;height:48px}
.empty-title{font-size:16px;color:var(--text-faint)}
.empty-desc{font-size:13px;color:var(--text-dimmed)}

/* Panel (table view) */
.panel{display:flex;flex-direction:column;flex:1;overflow:hidden}
.panel-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg-surface);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.panel-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--text-heading)}
.panel-title-icon{color:var(--text-faint);display:flex}
.panel-meta{color:var(--text-dimmed);font-size:12px;font-weight:400}
.panel-actions{display:flex;align-items:center;gap:8px}

/* Search */
.search-box{display:flex;align-items:center;gap:6px;background:var(--bg-input);border:1px solid var(--border-input);border-radius:4px;padding:0 8px}
.search-box:focus-within{border-color:var(--accent)}
.search-box svg{color:var(--text-faint);flex-shrink:0}
.search-box input{background:none;border:none;color:var(--text);font-size:13px;padding:5px 0;outline:none;width:220px}
.filter-help{color:var(--text-ghost);cursor:help;font-size:11px;user-select:none;flex-shrink:0}
.btn-filter{background:var(--accent);border:none;border-radius:3px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;width:22px;height:22px;padding:0;flex-shrink:0}
.btn-filter:hover{background:var(--accent-hover)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg-input);border:1px solid var(--border-input);border-radius:4px;color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap}
.btn:hover{background:var(--bg-hover)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#ffffff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-icon{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:none;border:1px solid transparent;border-radius:4px;color:var(--text-faint);cursor:pointer;padding:0}
.btn-icon:hover{background:var(--bg-hover);color:var(--text)}
.btn-icon.danger:hover{background:var(--danger-hover-bg);color:var(--danger-hover-text)}
.btn-icon:disabled{opacity:0.3;cursor:default;background:none}

/* Table */
.table-layout{display:flex;flex:1;min-height:0;overflow:hidden}
.table-container{flex:1;overflow:auto;min-width:0}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:1}
th{text-align:left;padding:6px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap}
.th-name{color:var(--text)}
.th-type{color:var(--text-ghost);font-weight:400;font-size:11px;margin-left:4px}
.th-actions{width:40px}
td{padding:5px 12px;border-bottom:1px solid var(--row-border);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',Monaco,'Cascadia Code','Fira Code',monospace;font-size:12px}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--bg-hover)}
tbody tr.selected{background:var(--bg-active)}
.td-readonly{color:var(--text-faint)}
.td-actions{text-align:center}
.null{color:var(--text-ghost);font-style:italic}
.empty-row{color:var(--text-dimmed);text-align:center;padding:32px 12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px}

/* Row editor */
.row-editor{width:360px;max-width:48vw;border-left:1px solid var(--border);background:var(--bg-surface);display:flex;flex-direction:column}
.row-editor-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.row-editor-title{font-size:13px;font-weight:600;color:var(--text-heading)}
.row-editor-meta{font-size:11px;color:var(--text-muted)}
.row-editor-body{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.row-editor-field label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px}
.row-editor-field input,.row-editor-field select,.row-editor-field textarea{width:100%;padding:6px 8px;background:var(--bg-input);border:1px solid var(--border-input);border-radius:3px;color:var(--text);font-size:12px;outline:none}
.row-editor-field input:focus,.row-editor-field select:focus,.row-editor-field textarea:focus{border-color:var(--accent)}
.row-editor-field textarea{min-height:80px;resize:vertical;font-family:'SF Mono',Monaco,'Cascadia Code','Fira Code',monospace}
.row-editor-readonly{padding:6px 8px;border:1px solid var(--border-input);border-radius:3px;background:var(--bg);color:var(--text-faint);min-height:30px}
.row-editor-actions{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;background:var(--bg-surface);border-top:1px solid var(--border);flex-shrink:0}
.page-info{color:var(--text-faint);font-size:12px}

/* Create form */
.create-panel{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:12px 16px}
.create-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;font-weight:500;color:var(--text-heading)}
.create-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:10px}
.form-field label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px}
.type-badge{color:var(--text-dimmed);font-size:10px}
.form-field input,.form-field select{width:100%;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border-input);border-radius:3px;color:var(--text);font-size:13px;outline:none}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.create-actions{display:flex;align-items:center;gap:8px}
.create-error{color:var(--error);font-size:12px}

/* Analytics */
.analytics-panel{display:flex;flex-direction:column;flex:1;overflow:hidden}
.analytics-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg-surface);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0}
.analytics-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--text-heading)}
.analytics-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.analytics-select{padding:5px 8px;background:var(--bg-input);border:1px solid var(--border-input);border-radius:4px;color:var(--text);font-size:12px}
.analytics-body{flex:1;overflow:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.analytics-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.analytics-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:10px}
.analytics-card-label{color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.6px}
.analytics-card-value{margin-top:4px;color:var(--text-heading);font-size:18px;font-variant-numeric:tabular-nums}
.analytics-chart-wrap{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:10px}
.analytics-chart-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;color:var(--text-muted);font-size:12px}
.analytics-chart-box{position:relative}
.analytics-chart{width:100%;height:156px;display:block}
.analytics-legend{display:flex;gap:14px;color:var(--text-muted);font-size:11px;margin-top:6px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-line{width:14px;height:2px;border-radius:1px}
.analytics-tooltip{position:absolute;z-index:5;min-width:180px;max-width:260px;background:var(--bg-input);border:1px solid var(--border-input);border-radius:6px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,0.25);pointer-events:none}
.tooltip-time{color:var(--text-heading);font-size:11px;margin-bottom:6px}
.tooltip-row{display:flex;justify-content:space-between;gap:8px;color:var(--text-muted);font-size:11px}
.analytics-route-list{display:flex;flex-wrap:wrap;gap:6px}
.analytics-route-chip{font-size:11px;padding:2px 6px;border:1px solid var(--border-input);border-radius:999px;background:var(--bg-input);color:var(--text-muted);cursor:pointer}
.analytics-route-chip.active{border-color:var(--accent);color:var(--text-heading)}
.analytics-logs{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.analytics-empty{padding:24px;color:var(--text-muted);text-align:center}
.log-row{cursor:pointer}
.log-row:hover{background:var(--bg-hover)}
.analytics-layout{display:flex;gap:12px;min-height:0}
.analytics-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px}
.analytics-detail{width:320px;max-width:38vw;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;max-height:min(72vh,780px)}
.analytics-detail-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.analytics-detail-title{font-size:13px;font-weight:600;color:var(--text-heading)}
.analytics-detail-body{padding:10px 12px;overflow:auto;display:flex;flex-direction:column;gap:8px}
.detail-row{display:grid;grid-template-columns:90px minmax(0,1fr);gap:8px;align-items:start}
.detail-key{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.detail-val{font-family:'SF Mono',Monaco,'Cascadia Code','Fira Code',monospace;font-size:11px;color:var(--text);word-break:break-word;white-space:pre-wrap}
.detail-pre{margin:0;padding:8px;background:var(--bg-input);border:1px solid var(--border-input);border-radius:4px;max-height:260px;overflow:auto}
.slow-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:999px;background:var(--danger-hover-bg);color:var(--danger-hover-text);font-size:10px;font-weight:600}
.trace-list{display:flex;flex-direction:column;gap:6px}
.trace-item{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:6px 8px;background:var(--bg-input);border:1px solid var(--border-input);border-radius:4px}
.trace-name{font-size:11px;color:var(--text)}
.trace-meta{font-size:10px;color:var(--text-faint)}
.trace-timeline{display:flex;flex-direction:column;gap:6px}
.trace-axis{position:relative;height:18px;border:1px solid var(--border-input);border-radius:4px;background:linear-gradient(90deg, rgba(130,150,170,0.08) 0%, rgba(130,150,170,0.02) 100%)}
.trace-axis-grid{position:absolute;top:0;bottom:0;width:1px;background:var(--border-input);opacity:0.55}
.trace-axis-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);padding:0 1px}
.trace-bar-wrap{display:flex;flex-direction:column;gap:2px}
.trace-bar-track{position:relative;height:16px;border:1px solid var(--border-input);border-radius:4px;background:rgba(127,127,127,0.06);overflow:hidden}
.trace-bar{position:absolute;top:1px;bottom:1px;border-radius:3px;min-width:2px;background:linear-gradient(90deg, rgba(41,179,255,0.95), rgba(30,130,220,0.95))}
.trace-row-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.trace-row-ms{font-size:10px;color:var(--text-muted)}
.observe-panel{display:flex;flex-direction:column;flex:1;overflow:hidden}
.observe-body{flex:1;overflow:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.observe-table-wrap{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.panel-table-scroll{flex:1;min-height:0;max-height:min(52vh,560px);overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.mono-sm{font-family:'SF Mono',Monaco,'Cascadia Code','Fira Code',monospace;font-size:11px}

/* File fields */
.file-display{display:inline-flex;align-items:center;gap:6px}
.file-thumb{width:20px;height:20px;object-fit:cover;border-radius:2px;vertical-align:middle}
.file-link{color:var(--accent);text-decoration:none;font-family:'SF Mono',Monaco,'Cascadia Code','Fira Code',monospace;font-size:12px}
.file-link:hover{text-decoration:underline}
.file-cell-editor{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;gap:4px;padding:2px 8px;background:var(--bg);outline:1px solid var(--accent);outline-offset:-1px;z-index:2}
.file-upload-btn{cursor:pointer}
.file-remove{color:var(--danger)}
.btn-sm{padding:2px 6px;font-size:11px}
.file-input-wrap{display:flex;align-items:center;gap:8px}
.file-input-name{color:var(--text);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}

@media (max-width: 980px) {
  .table-layout{flex-direction:column}
  .row-editor{width:100%;max-width:none;max-height:45vh;border-left:none;border-top:1px solid var(--border)}
  .analytics-layout{flex-direction:column}
  .analytics-detail{width:100%;max-width:none}
}

/* Toast */
.toast-container{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:1000;pointer-events:none}
.toast{padding:8px 14px;border-radius:4px;font-size:12px;color:#fff;pointer-events:auto}
.toast-success{background:#16825d}
.toast-error{background:#c72e2e}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover)}
::-webkit-scrollbar-corner{background:transparent}
</style>

<body>
<div id="app"></div>
<script type="module">
import { h, render, Component } from 'https://esm.sh/preact@10.25.4';
import { useState, useEffect, useRef, useCallback, useMemo } from 'https://esm.sh/preact@10.25.4/hooks';
import htm from 'https://esm.sh/htm@3.1.1';

const html = htm.bind(h);

// ── Auth ──
let TOKEN = localStorage.getItem('flop_admin_token');
if (!TOKEN) window.location.href = '/_/login';

let _refreshing = null;
async function refreshToken() {
  if (_refreshing) return _refreshing;
  const rt = localStorage.getItem('flop_admin_refresh');
  if (!rt) { logout(); throw new Error('No refresh token'); }
  _refreshing = fetch('/_/api/refresh', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ refreshToken: rt })
  }).then(async r => {
    _refreshing = null;
    if (!r.ok) { logout(); throw new Error('Refresh failed'); }
    const data = await r.json();
    TOKEN = data.token;
    localStorage.setItem('flop_admin_token', data.token);
    return data.token;
  }).catch(err => { _refreshing = null; throw err; });
  return _refreshing;
}

async function api(path, opts = {}) {
  const doFetch = () => fetch('/_/api' + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json', ...opts.headers }
  });
  let r = await doFetch();
  if (r.status === 401) {
    try { await refreshToken(); r = await doFetch(); } catch { return; }
  }
  if (r.status === 401 || r.status === 403) { logout(); throw new Error('Unauthorized'); }
  const isJSON = r.headers.get('content-type')?.includes('json');
  if (!r.ok) {
    if (isJSON) {
      const data = await r.json().catch(() => ({}));
      throw new Error(data.error || data.message || ('HTTP ' + r.status));
    }
    throw new Error('HTTP ' + r.status);
  }
  if (isJSON) return r.json();
  return r;
}

async function apiUpload(path, file) {
  const form = new FormData();
  form.append('file', file);
  const doFetch = () => fetch('/_/api' + path, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN },
    body: form
  });
  let r = await doFetch();
  if (r.status === 401) {
    try { await refreshToken(); r = await doFetch(); } catch { return; }
  }
  if (r.status === 401 || r.status === 403) { logout(); throw new Error('Unauthorized'); }
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || data.message || ('HTTP ' + r.status));
  return data;
}

async function apiDelete(path) {
  const doFetch = () => fetch('/_/api' + path, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + TOKEN }
  });
  let r = await doFetch();
  if (r.status === 401) {
    try { await refreshToken(); r = await doFetch(); } catch { return; }
  }
  if (r.status === 401 || r.status === 403) { logout(); throw new Error('Unauthorized'); }
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || data.message || ('HTTP ' + r.status));
  return data;
}

function logout() {
  localStorage.removeItem('flop_admin_token');
  localStorage.removeItem('flop_admin_refresh');
  window.location.href = '/_/login';
}

// ── Ref data cache ──
const refCache = {};
async function fetchRefOptions(tableName) {
  if (refCache[tableName]) return refCache[tableName];
  try {
    const data = await api('/tables/' + tableName + '/rows?limit=500');
    const rows = data.rows || [];
    const options = rows.map(r => {
      const keys = Object.keys(r);
      const id = r[keys[0]];
      const label = keys.length > 1 ? (r[keys[1]] || id) : id;
      return { id: String(id), label: String(label) };
    });
    refCache[tableName] = options;
    return options;
  } catch { return []; }
}

// ── Helpers ──
function isAutoField(schema, col) {
  if (!schema) return false;
  return Object.keys(schema)[0] === col;
}
function isReadOnly(schema, col) {
  if (!schema || !schema[col]) return false;
  return schema[col].type === 'bcrypt' || schema[col].cached === true;
}
function truncate(s, n = 60) {
  if (s == null) return '';
  const str = String(s);
  return str.length > n ? str.slice(0, n) + '...' : str;
}

// ── Toast ──
let _toastSet = null;
let _toastId = 0;
function showToast(message, type = 'success') {
  if (_toastSet) _toastSet(prev => [...prev, { id: ++_toastId, message, type }]);
}

function Toasts() {
  const [items, setItems] = useState([]);
  _toastSet = setItems;
  useEffect(() => {
    if (items.length === 0) return;
    const t = setTimeout(() => setItems(prev => prev.slice(1)), 2500);
    return () => clearTimeout(t);
  }, [items]);
  if (items.length === 0) return null;
  return html`<div class="toast-container">
    ${items.map(t => html`<div key=${t.id} class=${"toast toast-" + t.type}>${t.message}</div>`)}
  </div>`;
}

function valueToEditorInput(field, value) {
  if (value == null) return '';
  if (!field) return String(value);
  if (field.type === 'boolean') return value ? 'true' : 'false';
  if (['json', 'vector', 'roles', 'set', 'refMulti', 'fileMulti'].includes(field.type)) {
    try { return JSON.stringify(value); } catch { return String(value); }
  }
  return String(value);
}

function parseEditorInput(field, input) {
  if (!field) return input;
  if (field.type === 'number' || field.type === 'integer' || field.type === 'timestamp') {
    return input === '' ? null : Number(input);
  }
  if (field.type === 'boolean') return input === '' ? null : input === 'true';
  if (['json', 'vector', 'roles', 'set', 'refMulti', 'fileMulti'].includes(field.type)) {
    try { return JSON.parse(input); } catch { return input; }
  }
  return input;
}

function RowEditor({ mode = 'edit', tableName, schema, cols, row, createError, onClose, onSave, onCreate, onReload }) {
  const isCreate = mode === 'create';
  const pkField = cols[0];
  const pk = row ? row[pkField] : '';
  const [form, setForm] = useState({});
  const [pendingFiles, setPendingFiles] = useState({});
  const [refOptions, setRefOptions] = useState({});
  const [saving, setSaving] = useState(false);
  const [uploadingCol, setUploadingCol] = useState('');

  useEffect(() => {
    if (!schema) return;
    const next = {};
    for (const col of cols) {
      next[col] = isCreate ? '' : valueToEditorInput(schema[col], row ? row[col] : null);
    }
    setForm(next);
    setPendingFiles({});
  }, [row, schema, cols, isCreate]);

  useEffect(() => {
    if (!schema) return;
    const refs = Object.entries(schema)
      .filter(([, f]) => f && (f.type === 'ref' || f.type === 'refMulti') && f.refTable)
      .map(([col, f]) => ({ col, table: f.refTable }));
    let alive = true;
    Promise.all(refs.map(r => fetchRefOptions(r.table))).then(all => {
      if (!alive) return;
      const map = {};
      refs.forEach((r, i) => { map[r.col] = all[i]; });
      setRefOptions(map);
    });
    return () => { alive = false; };
  }, [schema]);

  const setCol = useCallback((col, value) => {
    setForm(prev => ({ ...prev, [col]: value }));
  }, []);

  const doSave = useCallback(async () => {
    if (!schema) return;

    if (isCreate) {
      const data = {};
      for (const col of cols) {
        if (isAutoField(schema, col)) continue;
        const f = schema[col];
        if (f && f.cached) continue;
        if (f && (f.type === 'fileSingle' || f.type === 'fileMulti')) continue;
        const raw = form[col] ?? '';
        if (raw === '') continue;
        data[col] = parseEditorInput(f, raw);
      }
      setSaving(true);
      try {
        await onCreate(data, pendingFiles);
      } catch (err) {
        // Errors are handled by submitCreate (toast + inline message).
      } finally {
        setSaving(false);
      }
      return;
    }

    if (!row) return;
    const payload = {};
    for (const col of cols) {
      if (isAutoField(schema, col) || isReadOnly(schema, col)) continue;
      const f = schema[col];
      if (f && (f.type === 'fileSingle' || f.type === 'fileMulti')) continue;
      const before = valueToEditorInput(f, row[col]);
      const after = form[col] ?? '';
      if (before !== after) payload[col] = parseEditorInput(f, after);
    }
    if (Object.keys(payload).length === 0) {
      showToast('No changes');
      return;
    }
    setSaving(true);
    try {
      await onSave(String(pk), payload);
    } catch (err) {
      showToast(err.message || 'Update failed', 'error');
    } finally {
      setSaving(false);
    }
  }, [schema, row, cols, form, pk, onSave, isCreate, onCreate, pendingFiles]);

  const onUploadFile = useCallback(async (col, e) => {
    if (isCreate) {
      const f = e.target.files[0];
      if (!f) return;
      setPendingFiles(prev => ({ ...prev, [col]: f }));
      setCol(col, f.name);
      if (e.target) e.target.value = '';
      return;
    }
    const f = e.target.files[0];
    if (!f) return;
    setUploadingCol(col);
    try {
      const res = await apiUpload('/tables/' + tableName + '/rows/' + pk + '/files/' + col, f);
      if (res && res.error) showToast(res.error, 'error');
      else showToast('File uploaded');
      await onReload();
    } catch (err) {
      showToast(err.message || 'Upload failed', 'error');
    } finally {
      setUploadingCol('');
      if (e.target) e.target.value = '';
    }
  }, [tableName, pk, onReload, isCreate, setCol]);

  const onRemoveFile = useCallback(async (col) => {
    if (isCreate) {
      setPendingFiles(prev => {
        const next = { ...prev };
        delete next[col];
        return next;
      });
      setCol(col, '');
      return;
    }
    try {
      await apiDelete('/tables/' + tableName + '/rows/' + pk + '/files/' + col);
      showToast('File removed');
      await onReload();
    } catch (err) {
      showToast(err.message || 'Remove failed', 'error');
    }
  }, [tableName, pk, onReload, isCreate, setCol]);

  return html`
    <aside class="row-editor">
      <div class="row-editor-header">
        <div>
          <div class="row-editor-title">${isCreate ? 'New Row' : 'Edit Row'}</div>
          <div class="row-editor-meta">${isCreate ? ('table: ' + tableName) : (pkField + ': ' + String(pk))}</div>
        </div>
        <button class="btn-icon" onClick=${onClose}>&times;</button>
      </div>
      <div class="row-editor-body">
        ${cols.map(col => {
          const field = schema ? schema[col] : null;
          const val = row ? row[col] : null;
          const ro = isCreate
            ? (isAutoField(schema, col) || (field && field.cached === true))
            : (isAutoField(schema, col) || isReadOnly(schema, col) || val === '[REDACTED]');
          const typeLabel = field ? field.type + (field.refTable ? ' -> ' + field.refTable : '') : '';
          const inputVal = form[col] ?? '';

          if (field && (field.type === 'fileSingle' || field.type === 'fileMulti')) {
            const accept = field.mimeTypes ? field.mimeTypes.join(',') : '';
            const singleFile = isCreate ? pendingFiles[col] : (field.type === 'fileSingle' ? val : null);
            const fileCount = isCreate
              ? (pendingFiles[col] ? 1 : 0)
              : (field.type === 'fileMulti' && Array.isArray(val) ? val.length : 0);
            return html`<div key=${col} class="row-editor-field">
              <label>${col} <span class="type-badge">${typeLabel}</span></label>
              <div class="row-editor-readonly">
                ${field.type === 'fileSingle' ? (singleFile && singleFile.name ? singleFile.name : html`<span class="null">null</span>`) : (fileCount > 0 ? fileCount + ' files' : html`<span class="null">null</span>`)}
              </div>
              <div class="create-actions" style="margin-top:6px">
                <label class="btn btn-sm btn-primary file-upload-btn">
                  ${uploadingCol === col ? 'Uploading...' : html`${icons.upload} Upload`}
                  <input type="file" accept=${accept} onChange=${e => onUploadFile(col, e)} hidden />
                </label>
                <button class="btn btn-sm file-remove" onClick=${() => onRemoveFile(col)}>${icons.trash} Remove</button>
              </div>
            </div>`;
          }

          if (ro) {
            const display = isCreate
              ? html`<span class="null">auto</span>`
              : (val == null ? html`<span class="null">null</span>` : (typeof val === 'object' ? JSON.stringify(val) : String(val)));
            return html`<div key=${col} class="row-editor-field">
              <label>${col} <span class="type-badge">${typeLabel}${typeLabel ? ' ' : ''}(read only)</span></label>
              <div class="row-editor-readonly">${display}</div>
            </div>`;
          }

          if (field && field.type === 'bcrypt') {
            return html`<div key=${col} class="row-editor-field">
              <label>${col} <span class="type-badge">${typeLabel}</span></label>
              <input type="password" value=${inputVal} onInput=${e => setCol(col, e.target.value)} />
            </div>`;
          }

          if (field && field.type === 'boolean') {
            return html`<div key=${col} class="row-editor-field">
              <label>${col} <span class="type-badge">${typeLabel}</span></label>
              <select value=${inputVal} onChange=${e => setCol(col, e.target.value)}>
                <option value="">null</option>
                <option value="true">true</option>
                <option value="false">false</option>
              </select>
            </div>`;
          }

          if (field && field.type === 'enum' && field.enumValues) {
            return html`<div key=${col} class="row-editor-field">
              <label>${col} <span class="type-badge">${typeLabel}</span></label>
              <select value=${inputVal} onChange=${e => setCol(col, e.target.value)}>
                <option value="">--</option>
                ${field.enumValues.map(v => html`<option key=${v} value=${v}>${v}</option>`)}
              </select>
            </div>`;
          }

          if (field && field.type === 'ref' && field.refTable) {
            const options = refOptions[col] || [];
            return html`<div key=${col} class="row-editor-field">
              <label>${col} <span class="type-badge">${typeLabel}</span></label>
              <select value=${inputVal} onChange=${e => setCol(col, e.target.value)}>
                <option value="">--</option>
                ${options.map(o => html`<option key=${o.id} value=${o.id}>${o.id}${o.label !== o.id ? ' - ' + o.label : ''}</option>`)}
              </select>
            </div>`;
          }

          if (field && ['json', 'vector', 'roles', 'set', 'refMulti'].includes(field.type)) {
            return html`<div key=${col} class="row-editor-field">
              <label>${col} <span class="type-badge">${typeLabel}</span></label>
              <textarea value=${inputVal} onInput=${e => setCol(col, e.target.value)}></textarea>
            </div>`;
          }

          const inputType = field && (field.type === 'number' || field.type === 'integer' || field.type === 'timestamp') ? 'number' : 'text';
          return html`<div key=${col} class="row-editor-field">
            <label>${col} <span class="type-badge">${typeLabel}</span></label>
            <input type=${inputType} value=${inputVal} onInput=${e => setCol(col, e.target.value)} />
          </div>`;
        })}
      </div>
      <div class="row-editor-actions">
        ${isCreate && createError && html`<span class="create-error" style="margin-right:auto">${createError}</span>`}
        <button class="btn" onClick=${onClose}>Close</button>
        <button class="btn btn-primary" disabled=${saving} onClick=${doSave}>${isCreate ? (saving ? 'Creating...' : 'Create Row') : (saving ? 'Saving...' : 'Save Changes')}</button>
      </div>
    </aside>
  `;
}

function DataTable({ tableName, schema, onReload, sseSignal }) {
  const [rows, setRows] = useState([]);
  const [page, setPage] = useState(1);
  const [totalPages, setTotalPages] = useState(1);
  const [total, setTotal] = useState(0);
  const [selectedPk, setSelectedPk] = useState(null);
  const [showCreate, setShowCreate] = useState(false);
  const [createErr, setCreateErr] = useState('');
  const [search, setSearch] = useState('');
  const [searchQuery, setSearchQuery] = useState('');

  const cols = useMemo(() => schema ? Object.keys(schema) : (rows.length > 0 ? Object.keys(rows[0]) : []), [schema, rows]);

  const loadRows = useCallback(async (p, q) => {
    const pg = p || page;
    const sq = q !== undefined ? q : searchQuery;
    const params = new URLSearchParams({ page: pg, limit: 50 });
    if (sq) {
      const isFilter = /[=<>~]|!=|!~/.test(sq);
      params.set(isFilter ? 'filter' : 'search', sq);
    }
    try {
      const data = await api('/tables/' + tableName + '/rows?' + params);
      if (data) {
        setRows(data.rows || []);
        setTotalPages(data.pages);
        setTotal(data.total);
      }
    } catch (err) {
      if (err && err.message) showToast(err.message, 'error');
    }
  }, [tableName, page, searchQuery]);

  useEffect(() => {
    setPage(1);
    setSearch('');
    setSearchQuery('');
    setShowCreate(false);
    setCreateErr('');
    setSelectedPk(null);
  }, [tableName]);

  useEffect(() => { loadRows(page, searchQuery); }, [tableName, page, searchQuery]);

  // Debounced reload when SSE signals changes for this table
  const sseReloadTimer = useRef(null);
  useEffect(() => {
    if (!sseSignal) return;
    clearTimeout(sseReloadTimer.current);
    sseReloadTimer.current = setTimeout(() => loadRows(), 500);
    return () => clearTimeout(sseReloadTimer.current);
  }, [sseSignal]);

  const applyFilter = useCallback(() => {
    setSearchQuery(search);
    setPage(1);
  }, [search]);

  const onSearchInput = useCallback((e) => {
    setSearch(e.target.value);
  }, []);

  const onSearchKey = useCallback((e) => {
    if (e.key === 'Enter') { e.preventDefault(); applyFilter(); }
  }, [applyFilter]);

  const saveRow = useCallback(async (pk, payload) => {
    await api('/tables/' + tableName + '/rows/' + pk, {
      method: 'PUT',
      body: JSON.stringify(payload)
    });
    showToast('Row updated');
    loadRows();
  }, [tableName, loadRows]);

  const deleteRow = useCallback(async (pk) => {
    if (!confirm('Delete row ' + pk + '?')) return;
    try {
      await api('/tables/' + tableName + '/rows/' + pk, { method: 'DELETE' });
      showToast('Row deleted');
    } catch(err) {
      showToast(err.message || 'Delete failed', 'error');
    }
    if (selectedPk != null && String(selectedPk) === String(pk)) setSelectedPk(null);
    loadRows();
  }, [tableName, loadRows, selectedPk]);

  const submitCreate = useCallback(async (data, pendingFiles) => {
    if (!schema) return;
    setCreateErr('');
    try {
      const res = await api('/tables/' + tableName + '/rows', { method: 'POST', body: JSON.stringify(data) });
      // Upload pending files using the new row's primary key
      if (res && res.row) {
        const pk = res.row[Object.keys(schema)[0]];
        for (const [col, file] of Object.entries(pendingFiles)) {
          const upRes = await apiUpload('/tables/' + tableName + '/rows/' + pk + '/files/' + col, file);
          if (upRes && upRes.error) showToast(col + ': ' + upRes.error, 'error');
        }
      }
      setShowCreate(false);
      setCreateErr('');
      showToast('Row created');
      loadRows();
    } catch(err) {
      showToast(err.message || 'Create failed', 'error');
      setCreateErr(err.message || 'Create failed');
      throw err;
    }
  }, [schema, tableName, loadRows]);

  const selectedRow = useMemo(() => {
    if (selectedPk == null) return null;
    return rows.find(r => String(r[cols[0]]) === String(selectedPk)) || null;
  }, [rows, cols, selectedPk]);

  return html`
    <div class="panel">
      <div class="panel-toolbar">
        <div class="panel-title">
          <span class="panel-title-icon">${icons.table}</span>
          ${tableName}
          <span class="panel-meta">${total} rows</span>
        </div>
        <div class="panel-actions">
          <div class="search-box">
            ${icons.search}
            <input type="text" placeholder='name="..." count>=5' value=${search} onInput=${onSearchInput} onKeyDown=${onSearchKey} />
            <span class="filter-help" title="= equals  != not equal  ~ contains  !~ not contains&#10;> >= < <= comparisons&#10;&& and  || or  () grouping&#10;&#10;Plain text = search all string fields">?</span>
            <button class="btn-filter" onClick=${applyFilter}>${icons.chevRight}</button>
          </div>
          <button class="btn btn-primary" onClick=${() => { setSelectedPk(null); setCreateErr(''); setShowCreate(true); }}>
            ${icons.plus} New Row
          </button>
        </div>
      </div>

      <div class="table-layout">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                ${cols.map(c => {
                  const f = schema ? schema[c] : null;
                  const typeStr = f ? f.type + (f.refTable ? ' -> ' + f.refTable : '') + (f.cached ? ' (cached)' : '') : '';
                  return html`<th key=${c}>
                    <span class="th-name">${c}</span>
                    ${typeStr && html`<span class="th-type">${typeStr}</span>`}
                  </th>`;
                })}
                <th class="th-actions"></th>
              </tr>
            </thead>
            <tbody>
              ${rows.length === 0 && html`
                <tr><td colspan=${cols.length + 1} class="empty-row">No rows found</td></tr>
              `}
              ${rows.map(row => {
                const pk = row[cols[0]];
                const isSelected = selectedPk != null && String(selectedPk) === String(pk);
                return html`
                  <tr key=${pk} class=${isSelected ? 'selected' : ''} onClick=${() => { setShowCreate(false); setCreateErr(''); setSelectedPk(String(pk)); }}>
                    ${cols.map(c => {
                      const val = row[c];
                      const ro = isReadOnly(schema, c) || isAutoField(schema, c) || val === '[REDACTED]';
                      const f = schema ? schema[c] : null;
                      const isFile = f && (f.type === 'fileSingle' || f.type === 'fileMulti');
                      const isObj = typeof val === 'object' && val !== null;
                      let display;
                      if (isFile && f.type === 'fileSingle' && val && val.name) {
                        const isImage = val.mime && val.mime.startsWith('image/');
                        display = html`<span class="file-display">${isImage ? html`<img class="file-thumb" src=${val.url} alt=${val.name} />` : ''}<a href=${val.url} target="_blank" class="file-link" onClick=${e => e.stopPropagation()}>${val.name}</a></span>`;
                      } else if (isFile && f.type === 'fileMulti' && Array.isArray(val) && val.length > 0) {
                        display = val.length + ' file' + (val.length !== 1 ? 's' : '');
                      } else if (isFile) {
                        display = null;
                      } else {
                        display = isObj ? JSON.stringify(val) : val;
                      }
                      const rendered = display == null
                        ? html`<span class="null">null</span>`
                        : (typeof display === 'object' ? display : truncate(String(display)));
                      return html`<td key=${c} class=${ro ? "td-readonly" : ""}>${rendered}</td>`;
                    })}
                    <td class="td-actions">
                      <button class="btn-icon danger" onClick=${(e) => { e.stopPropagation(); deleteRow(pk); }} title="Delete">${icons.trash}</button>
                    </td>
                  </tr>
                `;
              })}
            </tbody>
          </table>
        </div>
        ${showCreate && html`<${RowEditor}
          mode="create"
          tableName=${tableName}
          schema=${schema}
          cols=${cols}
          createError=${createErr}
          onClose=${() => { setShowCreate(false); setCreateErr(''); }}
          onCreate=${submitCreate}
          onReload=${loadRows}
        />`}
        ${!showCreate && selectedRow && html`<${RowEditor}
          tableName=${tableName}
          schema=${schema}
          cols=${cols}

          onClose=${() => setSelectedPk(null)}
          onSave=${saveRow}
          onReload=${loadRows}

      </div>

      ${totalPages > 1 && html`
        <div class="pagination">
          <button class="btn-icon" disabled=${page <= 1} onClick=${() => setPage(p => p - 1)}>${icons.chevLeft}</button>
          <span class="page-info">Page ${page} of ${totalPages}</span>
          <button class="btn-icon" disabled=${page >= totalPages} onClick=${() => setPage(p => p + 1)}>${icons.chevRight}</button>
        </div>
      `}
    </div>
  `;
}

function fmtCount(n) {
  return (Number(n) || 0).toLocaleString();
}

function fmtMs(n) {
  const v = Number(n) || 0;
  if (v >= 1000) return (v / 1000).toFixed(2) + 's';
  return v.toFixed(2) + 'ms';
}

function fmtPct(n) {
  return (Number(n) || 0).toFixed(2) + '%';
}

function fmtBytes(n) {
  const v = Number(n) || 0;
  if (v < 1024) return v.toFixed(0) + ' B';
  const units = ['KB', 'MB', 'GB', 'TB'];
  let x = v / 1024;
  let i = 0;
  while (x >= 1024 && i < units.length - 1) {
    x /= 1024;
    i++;
  }
  return x.toFixed(2) + ' ' + units[i];
}

function fmtTime(ts) {
  const n = Number(ts);
  if (!Number.isFinite(n) || n <= 0) return '-';
  return new Date(n).toLocaleString();
}

function downsamplePoints(points, maxPoints = 360) {
  if (!Array.isArray(points) || points.length <= maxPoints) return points || [];
  const out = [];
  const step = (points.length - 1) / (maxPoints - 1);
  for (let i = 0; i < maxPoints; i++) {
    out.push(points[Math.floor(i * step)]);
  }
  return out;
}

function AnalyticsChart({ points }) {
  const data = useMemo(() => downsamplePoints(points, 360), [points]);
  const boxRef = useRef(null);
  const [hover, setHover] = useState(null); // { xSvg, xPx, widthPx }
  if (!data || data.length === 0) {
    return html`<div class="analytics-empty">No metrics in selected window</div>`;
  }

  const width = 1000;
  const height = 220;
  const padX = 0;
  const padY = 16;
  const innerW = width - padX * 2;
  const innerH = height - padY * 2;

  const maxCount = Math.max(1, ...data.map(p => Number(p.count) || 0));
  const maxAvg = Math.max(1, ...data.map(p => Number(p.avgMs) || 0));

  const countPts = [];
  const avgPts = [];
  for (let i = 0; i < data.length; i++) {
    const x = padX + (i / Math.max(1, data.length - 1)) * innerW;
    const yCount = padY + innerH - ((Number(data[i].count) || 0) / maxCount) * innerH;
    const yAvg = padY + innerH - ((Number(data[i].avgMs) || 0) / maxAvg) * innerH;
    countPts.push(`${x.toFixed(2)},${yCount.toFixed(2)}`);
    avgPts.push(`${x.toFixed(2)},${yAvg.toFixed(2)}`);
  }

  const onMove = useCallback((e) => {
    if (!boxRef.current || data.length === 0) return;
    const rect = boxRef.current.getBoundingClientRect();
    if (rect.width <= 0) return;
    const localX = Math.min(Math.max(0, e.clientX - rect.left), rect.width);
    const xSvg = (localX / rect.width) * width;
    setHover((prev) => {
      if (prev && Math.abs(prev.xPx - localX) < 0.5) return prev;
      return { xSvg, xPx: localX, widthPx: rect.width };
    });
  }, [data]);

  const onLeave = useCallback(() => setHover(null), []);

  let hoverMeta = null;
  if (hover && data.length > 0) {
    const n = Math.max(1, data.length - 1);
    const xPlot = Math.min(Math.max(0, hover.xSvg), width);
    const t = innerW > 0 ? (xPlot - padX) / innerW : 0;
    const raw = t * n;
    const left = Math.floor(raw);
    const right = Math.min(data.length - 1, left + 1);
    const frac = raw - left;
    const idx = Math.min(Math.max(0, Math.round(raw)), data.length - 1);
    const p = data[idx] || {};
    const pl = data[left] || p;
    const pr = data[right] || p;
    const count = Number(p.count) || 0;
    const errors = Number(p.errorCount) || 0;
    const avg = Number(p.avgMs) || 0;
    const p95 = Number(p.p95Ms) || 0;
    const countInterp = (Number(pl.count) || 0) + ((Number(pr.count) || 0) - (Number(pl.count) || 0)) * frac;
    const avgInterp = (Number(pl.avgMs) || 0) + ((Number(pr.avgMs) || 0) - (Number(pl.avgMs) || 0)) * frac;
    const countY = padY + innerH - (countInterp / maxCount) * innerH;
    const avgY = padY + innerH - (avgInterp / maxAvg) * innerH;
    const tooltipLeft = Math.min(Math.max(8, hover.xPx + 12), Math.max(8, hover.widthPx - 228));
    hoverMeta = { idx, xSvg: xPlot, count, errors, avg, p95, ts: p.ts, countY, avgY, tooltipLeft };
  }

  return html`
    <div class="analytics-chart-box" ref=${boxRef} onMouseMove=${onMove} onMouseLeave=${onLeave}>
      <svg class="analytics-chart" viewBox=${`0 0 ${width} ${height}`} preserveAspectRatio="none">
        <line x1=${padX} y1=${height - padY} x2=${width - padX} y2=${height - padY} stroke="var(--border)" stroke-width="1" />
        <line x1=${padX} y1=${padY} x2=${padX} y2=${height - padY} stroke="var(--border)" stroke-width="1" />
        <polyline fill="none" stroke="var(--accent)" stroke-width="2" points=${countPts.join(' ')} />
        <polyline fill="none" stroke="var(--error)" stroke-width="2" points=${avgPts.join(' ')} />
        ${hoverMeta && html`
          <line x1=${hoverMeta.xSvg} y1=${padY} x2=${hoverMeta.xSvg} y2=${height - padY} stroke="var(--text-faint)" stroke-width="1" stroke-dasharray="3 3" />
          <circle cx=${hoverMeta.xSvg} cy=${hoverMeta.countY} r="3.5" fill="var(--accent)" />
          <circle cx=${hoverMeta.xSvg} cy=${hoverMeta.avgY} r="3.5" fill="var(--error)" />
        `}
      </svg>
      ${hoverMeta && html`
        <div class="analytics-tooltip" style=${`left:${hoverMeta.tooltipLeft}px;top:8px;`}>
          <div class="tooltip-time">${fmtTime(hoverMeta.ts)}</div>
          <div class="tooltip-row"><span>Requests</span><strong>${fmtCount(hoverMeta.count)}</strong></div>
          <div class="tooltip-row"><span>Errors</span><strong>${fmtCount(hoverMeta.errors)}</strong></div>
          <div class="tooltip-row"><span>Error rate</span><strong>${fmtPct(hoverMeta.count > 0 ? (hoverMeta.errors / hoverMeta.count) * 100 : 0)}</strong></div>
          <div class="tooltip-row"><span>Avg duration</span><strong>${fmtMs(hoverMeta.avg)}</strong></div>
          <div class="tooltip-row"><span>P95 duration</span><strong>${fmtMs(hoverMeta.p95)}</strong></div>
        </div>
      `}
    </div>
    <div class="analytics-legend">
      <span class="legend-item"><span class="legend-line" style="background:var(--accent)"></span>Requests/min</span>
      <span class="legend-item"><span class="legend-line" style="background:var(--error)"></span>Average duration</span>
    </div>
  `;
}

function RequestsBarChart({ points }) {
  const data = useMemo(() => downsamplePoints(points, 120), [points]);
  if (!data || data.length === 0) {
    return html`<div class="analytics-empty">No request volume in selected window</div>`;
  }
  const width = 1000;
  const height = 220;
  const padX = 12;
  const padY = 14;
  const innerW = width - padX * 2;
  const innerH = height - padY * 2;
  const maxCount = Math.max(1, ...data.map(p => Number(p.count) || 0));
  const barW = innerW / Math.max(data.length, 1);

  return html`
    <div class="analytics-chart-box">
      <svg class="analytics-chart" viewBox=${`0 0 ${width} ${height}`} preserveAspectRatio="none">
        <line x1=${padX} y1=${height - padY} x2=${width - padX} y2=${height - padY} stroke="var(--border)" stroke-width="1" />
        ${data.map((p, i) => {
          const count = Number(p.count) || 0;
          const h = (count / maxCount) * innerH;
          const x = padX + i * barW + Math.max(1, barW * 0.1);
          const y = height - padY - h;
          const w = Math.max(1, barW * 0.8);
          return html`<rect key=${p.ts || i} x=${x} y=${y} width=${w} height=${h} fill="var(--accent)" opacity=${count > 0 ? "0.8" : "0.25"} />`;
        })}
      </svg>
    </div>
    <div class="analytics-legend">
      <span class="legend-item"><span class="legend-line" style="background:var(--accent)"></span>Requests per bucket</span>
    </div>
  `;
}

function parseDetailsObject(raw) {
  if (!raw) return null;
  if (typeof raw === 'object') return raw;
  if (typeof raw !== 'string') return null;
  try { return JSON.parse(raw); } catch { return null; }
}

function extractTraceEvents(detailsObj) {
  if (!detailsObj || typeof detailsObj !== 'object') return [];
  if (Array.isArray(detailsObj.trace)) return detailsObj.trace;
  if (Array.isArray(detailsObj.spans)) return detailsObj.spans;
  return [];
}

function toNum(v, fallback = 0) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function buildTraceTimeline(events) {
  const rows = (Array.isArray(events) ? events : []).map((e, i) => {
    const ms = toNum(e && (e.ms != null ? e.ms : e.durationMs), 0);
    const s = toNum(e && e.started, NaN);
    const f = toNum(e && e.finished, NaN);
    return {
      i,
      raw: e || {},
      ms: Math.max(0, ms),
      hasRange: Number.isFinite(s) && Number.isFinite(f) && f >= s,
      start: s,
      finish: f,
    };
  });
  if (rows.length === 0) return { rows: [], totalMs: 0 };

  let cursor = 0;
  for (const r of rows) {
    if (r.hasRange) {
      r.relStart = r.start;
      r.relEnd = r.finish;
    } else {
      r.relStart = cursor;
      r.relEnd = cursor + r.ms;
      cursor = r.relEnd;
    }
  }

  const minStart = Math.min(...rows.map(r => toNum(r.relStart, 0)));
  const maxEnd = Math.max(...rows.map(r => toNum(r.relEnd, 0)));
  const totalMs = Math.max(1, maxEnd - minStart);

  for (const r of rows) {
    const startMs = Math.max(0, toNum(r.relStart, 0) - minStart);
    const endMs = Math.max(startMs, toNum(r.relEnd, startMs));
    const dur = Math.max(1, endMs - startMs);
    r.offsetPct = (startMs / totalMs) * 100;
    r.widthPct = (dur / totalMs) * 100;
  }

  return { rows, totalMs };
}

function AnalyticsPanel({ page = 'volume' }) {
  const isPerformance = page === 'performance';
  const [supported, setSupported] = useState(true);
  const [loaded, setLoaded] = useState(false);
  const [windowSize, setWindowSize] = useState('24h');
  const [config, setConfig] = useState(null);
  const [series, setSeries] = useState({ points: [], summary: { count: 0, errorCount: 0, errorRate: 0, avgMs: 0, p95Ms: 0 }, routes: [], droppedEvents: 0, retentionHours: 168 });
  const [runtimeStats, setRuntimeStats] = useState(null);
  const [routeType, setRouteType] = useState('');
  const [routeName, setRouteName] = useState('');
  const [logs, setLogs] = useState([]);
  const [logPage, setLogPage] = useState(1);
  const [logPages, setLogPages] = useState(1);
  const [logTotal, setLogTotal] = useState(0);
  const [logSearch, setLogSearch] = useState('');
  const [logSearchQuery, setLogSearchQuery] = useState('');
  const [selectedLog, setSelectedLog] = useState(null);
  const [slowMs, setSlowMs] = useState(250);

  const loadConfig = useCallback(async () => {
    try {
      const data = await api('/analytics/config');
      if (!data || !data.enabled) {
        setSupported(false);
        return;
      }
      setSupported(true);
      setConfig(data);
    } catch {
      setSupported(false);
    }
  }, []);

  const loadSeries = useCallback(async () => {
    if (!supported) return;
    const params = new URLSearchParams({ window: windowSize });
    if (routeType) params.set('routeType', routeType);
    if (routeName) params.set('routeName', routeName);
    try {
      const data = await api('/analytics/timeseries?' + params.toString());
      if (data && data.data) {
        setSeries(data.data);
      }
    } catch (err) {
      showToast(err.message || 'Failed to load metrics', 'error');
    }
  }, [supported, windowSize, routeType, routeName]);

  const loadLogs = useCallback(async (pageArg, queryArg) => {
    if (!supported) return;
    const pg = pageArg || logPage;
    const q = queryArg !== undefined ? queryArg : logSearchQuery;
    const params = new URLSearchParams({ page: String(pg), limit: '50' });
    if (q) {
      const isFilter = /[=<>~]|!=|!~/.test(q);
      params.set(isFilter ? 'filter' : 'search', q);
    }
    try {
      const data = await api('/analytics/logs?' + params.toString());
      if (data) {
        setLogs(data.rows || []);
        setLogPages(data.pages || 1);
        setLogTotal(data.total || 0);
      }
    } catch (err) {
      showToast(err.message || 'Failed to load request logs', 'error');
    }
  }, [supported, logPage, logSearchQuery]);

  const loadRuntime = useCallback(async () => {
    if (!supported) return;
    try {
      const data = await api('/analytics/runtime');
      if (data && data.data) setRuntimeStats(data.data);
    } catch {
      // Best effort: runtime stats are informational only.
    }
  }, [supported]);

  useEffect(() => {
    loadConfig().finally(() => setLoaded(true));
  }, []);

  useEffect(() => {
    if (!supported) return;
    loadSeries();
    loadRuntime();
  }, [supported, loadSeries]);

  useEffect(() => {
    if (!supported) return;
    loadLogs(logPage, logSearchQuery);
  }, [supported, logPage, logSearchQuery, loadLogs]);

  useEffect(() => {
    if (!selectedLog) return;
    const found = logs.find(l => String(l.id) === String(selectedLog.id));
    if (!found) setSelectedLog(null);
    else if (found !== selectedLog) setSelectedLog(found);
  }, [logs, selectedLog]);

  useEffect(() => {
    if (!supported) return;
    const id = setInterval(() => {
      loadSeries();
      loadLogs(logPage, logSearchQuery);
      loadRuntime();
    }, 10000);
    return () => clearInterval(id);
  }, [supported, loadSeries, loadLogs, loadRuntime, logPage, logSearchQuery]);

  const applyLogFilter = useCallback(() => {
    setLogSearchQuery(logSearch.trim());
    setLogPage(1);
  }, [logSearch]);

  const onLogSearchKey = useCallback((e) => {
    if (e.key === 'Enter') { e.preventDefault(); applyLogFilter(); }
  }, [applyLogFilter]);

  if (!loaded) {
    return html`<div class="empty-state"><div class="empty-title">Loading analytics…</div></div>`;
  }
  if (!supported) {
    return html`<div class="empty-state"><div class="empty-title">Analytics unavailable</div><div class="empty-desc">This runtime does not expose request analytics endpoints.</div></div>`;
  }

  const summary = series.summary || { count: 0, errorCount: 0, errorRate: 0, avgMs: 0, p95Ms: 0 };
  const routeChips = (series.routes || []).slice(0, 12);
  const slowLogs = (logs || []).filter(r => Number(r.durationMs) >= Number(slowMs || 0));
  const selectedDetails = parseDetailsObject(selectedLog && selectedLog.details);
  const traceEvents = extractTraceEvents(selectedDetails);
  const traceTimeline = buildTraceTimeline(traceEvents);

  return html`
    <div class="analytics-panel">
      <div class="analytics-toolbar">
        <div class="analytics-title">${icons.chart} ${isPerformance ? 'Request Performance' : 'Request Volume'}</div>
        <div class="analytics-actions">
          <select class="analytics-select" value=${windowSize} onChange=${e => { setWindowSize(e.target.value); setLogPage(1); }}>
            <option value="1h">Last 1 hour</option>
            <option value="6h">Last 6 hours</option>
            <option value="24h">Last 24 hours</option>
            <option value="7d">Last 7 days</option>
          </select>
        </div>
      </div>

      <div class="analytics-body">
        <div class="analytics-layout">
          <div class="analytics-main">
            <div class="analytics-cards">
              <div class="analytics-card"><div class="analytics-card-label">Requests</div><div class="analytics-card-value">${fmtCount(summary.count)}</div></div>
              <div class="analytics-card"><div class="analytics-card-label">Errors</div><div class="analytics-card-value">${fmtCount(summary.errorCount)}</div></div>
              <div class="analytics-card"><div class="analytics-card-label">Error Rate</div><div class="analytics-card-value">${fmtPct(summary.errorRate)}</div></div>
              <div class="analytics-card"><div class="analytics-card-label">Avg Duration</div><div class="analytics-card-value">${fmtMs(summary.avgMs)}</div></div>
              <div class="analytics-card"><div class="analytics-card-label">P95 Duration</div><div class="analytics-card-value">${fmtMs(summary.p95Ms)}</div></div>
              ${isPerformance && html`<div class="analytics-card"><div class="analytics-card-label">Slow (${fmtMs(slowMs)}+)</div><div class="analytics-card-value">${fmtCount(slowLogs.length)}</div></div>`}
              ${isPerformance && html`<div class="analytics-card"><div class="analytics-card-label">Routes</div><div class="analytics-card-value">${fmtCount((series.routes || []).length)}</div></div>`}
              ${!isPerformance && html`<div class="analytics-card"><div class="analytics-card-label">Dropped Events</div><div class="analytics-card-value">${fmtCount(series.droppedEvents)}</div></div>`}
            </div>

            <div class="analytics-chart-wrap">
              <div class="analytics-chart-title">
                <span>${isPerformance ? 'Request duration and volume over time' : 'Request volume over time'}</span>
                <span>Retention: ${Number(series.retentionHours || (config && config.retentionHours) || 168).toFixed(0)}h</span>
              </div>
              ${isPerformance
                ? html`<${AnalyticsChart} points=${series.points || []} />`
                : html`<${RequestsBarChart} points=${series.points || []} />`}
            </div>

            ${isPerformance && html`
              <div class="analytics-route-list">
                <button class=${"analytics-route-chip" + (!routeName && !routeType ? " active" : "")} onClick=${() => { setRouteType(''); setRouteName(''); }}>All routes</button>
                ${routeChips.map(rt => html`
                  <button
                    key=${rt.routeType + ':' + rt.routeName}
                    class=${"analytics-route-chip" + (routeType === rt.routeType && routeName === rt.routeName ? " active" : "")}
                    onClick=${() => { setRouteType(rt.routeType); setRouteName(rt.routeName); setLogPage(1); }}
                  >
                    ${rt.routeType}/${rt.routeName} · ${fmtCount(rt.count)}
                  </button>
                `)}
              </div>
            `}

            <div class="analytics-logs">
              <div class="panel-toolbar">
                <div class="panel-title">
                  <span class="panel-title-icon">${icons.table}</span>
                  ${isPerformance ? 'Request Performance' : 'Request Events'}
                  <span class="panel-meta">${fmtCount(logTotal)} rows</span>
                </div>
                <div class="panel-actions">
                  ${isPerformance && html`
                    <div class="search-box">
                      <span style="color:var(--text-faint);font-size:11px">slow ≥</span>
                      <input type="number" min="1" value=${String(slowMs)} onInput=${e => setSlowMs(Number(e.target.value) || 0)} style="width:80px" />
                      <span style="color:var(--text-faint);font-size:11px">ms</span>
                    </div>
                  `}
                  <div class="search-box">
                    ${icons.search}
                    <input type="text" placeholder='routeName~"get_" durationMs>=20' value=${logSearch} onInput=${e => setLogSearch(e.target.value)} onKeyDown=${onLogSearchKey} />
                    <span class="filter-help" title="= equals  != not equal  ~ contains  !~ not contains&#10;> >= < <= comparisons&#10;&& and  || or  () grouping&#10;&#10;Plain text = search in route/error/details">?</span>
                    <button class="btn-filter" onClick=${applyLogFilter}>${icons.chevRight}</button>
                  </div>
                </div>
              </div>

              <div class="table-container panel-table-scroll">
                <table>
                  <thead>
                    <tr>
                      <th><span class="th-name">time</span></th>
                      <th><span class="th-name">route</span></th>
                      <th><span class="th-name">status</span></th>
                      <th><span class="th-name">duration</span></th>
                      <th><span class="th-name">error</span></th>
                      <th><span class="th-name">details</span></th>
                    </tr>
                  </thead>
                  <tbody>
                    ${logs.length === 0 && html`<tr><td colspan="6" class="empty-row">No logs found</td></tr>`}
                    ${logs.map(row => html`
                      <tr key=${row.id} class="log-row" onClick=${() => setSelectedLog(row)}>
                        <td>${fmtTime(row.ts)}</td>
                        <td>${row.routeType}/${row.routeName}</td>
                        <td>${row.status}</td>
                        <td>
                          ${fmtMs(row.durationMs)}
                          ${isPerformance && Number(row.durationMs) >= Number(slowMs || 0) && html`<span class="slow-badge">slow</span>`}
                        </td>
                        <td>${row.errorMessage ? truncate(row.errorMessage, 90) : html`<span class="null">-</span>`}</td>
                        <td title=${row.details || ''}>${row.details ? truncate(row.details, 120) : html`<span class="null">-</span>`}</td>
                      </tr>
                    `)}
                  </tbody>
                </table>
              </div>

              ${logPages > 1 && html`
                <div class="pagination">
                  <button class="btn-icon" disabled=${logPage <= 1} onClick=${() => setLogPage(p => p - 1)}>${icons.chevLeft}</button>
                  <span class="page-info">Page ${logPage} of ${logPages}</span>
                  <button class="btn-icon" disabled=${logPage >= logPages} onClick=${() => setLogPage(p => p + 1)}>${icons.chevRight}</button>
                </div>
              `}
            </div>
          </div>

          ${selectedLog && html`
            <aside class="analytics-detail">
              <div class="analytics-detail-header">
                <div>
                  <div class="analytics-detail-title">Request Detail</div>
                  <div class="panel-meta">${selectedLog.routeType}/${selectedLog.routeName}</div>
                </div>
                <button class="btn-icon" onClick=${() => setSelectedLog(null)}>&times;</button>
              </div>
              <div class="analytics-detail-body">
                <div class="detail-row"><div class="detail-key">time</div><div class="detail-val">${fmtTime(selectedLog.ts)}</div></div>
                <div class="detail-row"><div class="detail-key">status</div><div class="detail-val">${String(selectedLog.status ?? '-')}</div></div>
                <div class="detail-row"><div class="detail-key">duration</div><div class="detail-val">${fmtMs(selectedLog.durationMs)}</div></div>
                <div class="detail-row"><div class="detail-key">route</div><div class="detail-val">${selectedLog.routeType}/${selectedLog.routeName}</div></div>
                <div class="detail-row"><div class="detail-key">error</div><div class="detail-val">${selectedLog.errorMessage || '-'}</div></div>
                <div class="detail-row">
                  <div class="detail-key">trace</div>
                  <div class="detail-val">
                    ${traceEvents.length > 0
                      ? html`<div class="trace-timeline">
                        <div class="trace-axis">
                          <div class="trace-axis-grid" style=${{ left: '25%' }}></div>
                          <div class="trace-axis-grid" style=${{ left: '50%' }}></div>
                          <div class="trace-axis-grid" style=${{ left: '75%' }}></div>
                        </div>
                        <div class="trace-axis-labels">
                          <span>0ms</span>
                          <span>${fmtMs(traceTimeline.totalMs / 2)}</span>
                          <span>${fmtMs(traceTimeline.totalMs)}</span>
                        </div>
                        <div class="trace-list">
                        ${traceTimeline.rows.map((r) => {
                          const t = r.raw;
                          return html`
                          <div key=${String(r.i)} class="trace-item">
                            <div>
                              <div class="trace-row-top">
                                <div class="trace-name">${t.op || t.name || t.stage || 'operation'}</div>
                                <div class="trace-row-ms">${fmtMs(r.ms)}</div>
                              </div>
                              <div class="trace-meta">
                                ${t.table ? ('table=' + t.table + ' ') : ''}${t.index ? ('index=' + t.index + ' ') : ''}${t.rows != null ? ('rows=' + t.rows + ' ') : ''}${t.note || ''}
                              </div>
                              <div class="trace-bar-wrap">
                                <div class="trace-bar-track">
                                  <div class="trace-bar" style=${{ left: `${r.offsetPct}%`, width: `${r.widthPct}%` }}></div>
                                </div>
                              </div>
                            </div>
                          </div>
                        `;
                        })}
                        </div>
                      </div>`
                      : 'Per-request DB trace not available from backend yet (no scan/index timing emitted).'}
                  </div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">details</div>
                  <div class="detail-val">
                    ${selectedDetails
                      ? html`<pre class="detail-pre">${JSON.stringify(selectedDetails, null, 2)}</pre>`
                      : (selectedLog.details ? html`<pre class="detail-pre">${String(selectedLog.details)}</pre>` : '-')}
                  </div>
                </div>
              </div>
            </aside>
          `}
        </div>
      </div>
    </div>
  `;
}

function ObservePanel() {
  const [loaded, setLoaded] = useState(false);
  const [supported, setSupported] = useState(true);
  const [report, setReport] = useState(null);
  const [runtimeStats, setRuntimeStats] = useState(null);
  const [query, setQuery] = useState('');

  const load = useCallback(async () => {
    try {
      const [indexResp, runtimeResp] = await Promise.all([
        api('/analytics/indexes'),
        api('/analytics/runtime'),
      ]);
      if (!indexResp || !indexResp.data) {
        setSupported(false);
        return;
      }
      setReport(indexResp.data);
      if (runtimeResp && runtimeResp.data) setRuntimeStats(runtimeResp.data);
      setSupported(true);
    } catch {
      setSupported(false);
    } finally {
      setLoaded(true);
    }
  }, []);

  useEffect(() => {
    load();
    const id = setInterval(load, 10000);
    return () => clearInterval(id);
  }, [load]);

  if (!loaded) {
    return html`<div class="empty-state"><div class="empty-title">Loading observability…</div></div>`;
  }
  if (!supported) {
    return html`<div class="empty-state"><div class="empty-title">Observe unavailable</div><div class="empty-desc">This runtime does not expose index diagnostics.</div></div>`;
  }

  const tables = Array.isArray(report?.tables) ? report.tables : [];
  const q = query.trim().toLowerCase();
  const filtered = q
    ? tables.filter(t =>
      (t.table || '').toLowerCase().includes(q) ||
      (t.secondaryIndexes || []).some(i =>
        (i.name || '').toLowerCase().includes(q) ||
        (i.type || '').toLowerCase().includes(q) ||
        (i.fields || []).join(',').toLowerCase().includes(q)
      )
    )
    : tables;

  const secondaryEntries = filtered.reduce((sum, t) =>
    sum + (t.secondaryIndexes || []).reduce((inner, i) => inner + (Number(i.entryCount) || 0), 0), 0
  );

  return html`
    <div class="observe-panel">
      <div class="analytics-toolbar">
        <div class="analytics-title">${icons.pulse} Observe</div>
        <div class="analytics-actions">
          <div class="search-box">
            ${icons.search}
            <input type="text" placeholder="Filter tables/indexes…" value=${query} onInput=${e => setQuery(e.target.value)} />
          </div>
        </div>
      </div>

      <div class="observe-body">
        <div class="analytics-cards">
          <div class="analytics-card"><div class="analytics-card-label">Tables</div><div class="analytics-card-value">${fmtCount(report?.tableCount)}</div></div>
          <div class="analytics-card"><div class="analytics-card-label">Primary Indexes</div><div class="analytics-card-value">${fmtCount(report?.primaryIndexCount)}</div></div>
          <div class="analytics-card"><div class="analytics-card-label">Secondary Indexes</div><div class="analytics-card-value">${fmtCount(report?.secondaryIndexCount)}</div></div>
          <div class="analytics-card"><div class="analytics-card-label">Index Entries</div><div class="analytics-card-value">${fmtCount(secondaryEntries)}</div></div>
          <div class="analytics-card"><div class="analytics-card-label">Estimated Index Payload</div><div class="analytics-card-value">${fmtBytes(report?.estimatedPayloadBytes)}</div></div>
          <div class="analytics-card"><div class="analytics-card-label">Heap In Use</div><div class="analytics-card-value">${fmtBytes(runtimeStats?.heapInuse)}</div></div>
          <div class="analytics-card"><div class="analytics-card-label">Heap Idle</div><div class="analytics-card-value">${fmtBytes(runtimeStats?.heapIdle)}</div></div>
          <div class="analytics-card"><div class="analytics-card-label">Go Sys</div><div class="analytics-card-value">${fmtBytes(runtimeStats?.sys)}</div></div>
        </div>

        <div class="observe-table-wrap">
          <div class="panel-toolbar">
            <div class="panel-title">
              <span class="panel-title-icon">${icons.table}</span>
              Indexes By Table
              <span class="panel-meta">${fmtCount(filtered.length)} tables</span>
            </div>
            <div class="panel-meta">snapshot ${fmtTime(report?.generatedAtUnixMilli)}</div>
          </div>
          <div class="table-container panel-table-scroll">
            <table>
              <thead>
                <tr>
                  <th><span class="th-name">table</span></th>
                  <th><span class="th-name">index</span></th>
                  <th><span class="th-name">type</span></th>
                  <th><span class="th-name">entries</span></th>
                  <th><span class="th-name">keys</span></th>
                  <th><span class="th-name">est. payload</span></th>
                  <th><span class="th-name">ready</span></th>
                </tr>
              </thead>
              <tbody>
                ${filtered.length === 0 && html`<tr><td colspan="7" class="empty-row">No matching tables/indexes</td></tr>`}
                ${filtered.map(t => html`
                  <tr key=${t.table + ':primary'}>
                    <td>${t.table}<span class="th-type"> (${fmtCount(t.rows)} rows)</span></td>
                    <td class="mono-sm">${t.primaryKeyField || 'id'} (primary)</td>
                    <td>primary</td>
                    <td>${fmtCount(t.primaryKeys)}</td>
                    <td>${fmtCount(t.primaryKeys)}</td>
                    <td>${fmtBytes(t.primaryEstimatedBytes)}</td>
                    <td>yes</td>
                  </tr>
                  ${(t.secondaryIndexes || []).map(idx => html`
                    <tr key=${t.table + ':' + idx.name}>
                      <td><span class="null">↳</span></td>
                      <td class="mono-sm">${idx.name}${idx.fields && idx.fields.length ? ' [' + idx.fields.join(', ') + ']' : ''}</td>
                      <td>${idx.type}${idx.unique ? ' (u)' : ''}</td>
                      <td>${fmtCount(idx.entryCount)}</td>
                      <td>${fmtCount(idx.keyCount)}</td>
                      <td>${fmtBytes(idx.estimatedPayloadBytes)}</td>
                      <td>${t.secondaryReady ? 'yes' : 'building'}</td>
                    </tr>
                  `)}
                `)}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Main App ──
function App() {
  const [tables, setTables] = useState([]);
  const [currentTable, setCurrentTable] = useState(null);
  const [viewMode, setViewMode] = useState('table');
  const [analyticsEnabled, setAnalyticsEnabled] = useState(false);
  const [observeEnabled, setObserveEnabled] = useState(false);
  const evtRef = useRef(null);

  const loadTables = useCallback(async () => {
    const data = await api('/tables');
    if (data) setTables(data.tables);
  }, []);

  // SSE change signal — bumped for the currently viewed table so DataTable can debounce-reload
  const [sseSignal, setSseSignal] = useState(0);

  // SSE — batch rapid events into a single state update per animation frame
  useEffect(() => {
    const pendingDeltas = {};   // tableName -> net count delta
    const dirtyRefCache = {};   // tables whose refCache needs clearing
    let rafId = 0;

    function flushDeltas() {
      rafId = 0;
      const deltas = Object.assign({}, pendingDeltas);
      const dirty = Object.keys(dirtyRefCache);
      // Clear accumulators
      for (const k in pendingDeltas) delete pendingDeltas[k];
      for (const k in dirtyRefCache) delete dirtyRefCache[k];
      // Invalidate ref cache for changed tables
      for (const t of dirty) delete refCache[t];
      // Bump SSE signal so DataTable can debounce-reload
      if (dirty.length > 0) setSseSignal(c => c + 1);
      // Single state update for all accumulated changes
      setTables(prev => {
        let changed = false;
        const next = prev.map(t => {
          const d = deltas[t.name];
          if (d === undefined || d === 0) return t;
          changed = true;
          return { ...t, rowCount: Math.max(0, t.rowCount + d) };
        });
        return changed ? next : prev;
      });
    }

    function scheduleFlush() {
      if (!rafId) rafId = requestAnimationFrame(flushDeltas);
    }

    function connect() {
      if (evtRef.current) evtRef.current.close();
      const es = new EventSource('/_/api/events?_token=' + TOKEN);
      evtRef.current = es;

      es.addEventListener('snapshot', (e) => {
        try {
          const { tableCounts } = JSON.parse(e.data);
          if (tableCounts) {
            setTables(prev => prev.map(t => tableCounts[t.name] !== undefined ? { ...t, rowCount: tableCounts[t.name] } : t));
          }
        } catch {}
      });

      es.addEventListener('change', (e) => {
        try {
          const evt = JSON.parse(e.data);
          dirtyRefCache[evt.table] = 1;
          if (evt.op === 'insert') pendingDeltas[evt.table] = (pendingDeltas[evt.table] || 0) + 1;
          else if (evt.op === 'delete') pendingDeltas[evt.table] = (pendingDeltas[evt.table] || 0) - 1;
          // updates don't change count — still schedule to clear refCache
          scheduleFlush();
        } catch {}
      });

      es.onerror = () => { es.close(); setTimeout(connect, 3000); };
    }
    connect();
    return () => {
      if (evtRef.current) evtRef.current.close();
      if (rafId) cancelAnimationFrame(rafId);
    };
  }, []);

  useEffect(() => { loadTables(); }, []);
  useEffect(() => {
    api('/analytics/config').then((data) => {
      if (data && data.enabled) setAnalyticsEnabled(true);
    }).catch(() => setAnalyticsEnabled(false));
    api('/analytics/indexes').then((data) => {
      if (data && data.data) setObserveEnabled(true);
    }).catch(() => setObserveEnabled(false));
  }, []);

  // Hash sync
  useEffect(() => {
    function read() {
      const h = window.location.hash.slice(1);
      if (!h) return;
      const decoded = decodeURIComponent(h.split('/')[0]);
      if (decoded === '_analytics' || decoded === '_analytics-volume') {
        setViewMode('analytics-volume');
        return;
      }
      if (decoded === '_analytics-performance') {
        setViewMode('analytics-performance');
        return;
      }
      if (decoded === '_observe') {
        setViewMode('observe');
        return;
      }
      setViewMode('table');
      setCurrentTable(decoded);
    }
    read();
    window.addEventListener('hashchange', read);
    return () => window.removeEventListener('hashchange', read);
  }, []);

  const selectTable = useCallback((name) => {
    setViewMode('table');
    setCurrentTable(name);
    window.location.hash = name;
  }, []);

  const selectAnalyticsVolume = useCallback(() => {
    setViewMode('analytics-volume');
    window.location.hash = '_analytics-volume';
  }, []);

  const selectAnalyticsPerformance = useCallback(() => {
    setViewMode('analytics-performance');
    window.location.hash = '_analytics-performance';
  }, []);

  const selectObserve = useCallback(() => {
    setViewMode('observe');
    window.location.hash = '_observe';
  }, []);

  const handleBackup = useCallback(async () => {
    const res = await fetch('/_/api/backup', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'flop-backup-' + new Date().toISOString().replace(/[:.]/g, '-') + '.tar.gz';
    a.click();
  }, []);

  const handleRestore = useCallback(async (e) => {
    const file = e.target.files[0];
    if (!file || !confirm('This will REPLACE all data. Continue?')) return;
    const res = await fetch('/_/api/backup', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN },
      body: file,
    });
    const data = await res.json();
    alert(data.message || data.error || 'Done');
    window.location.reload();
  }, []);

  const currentSchema = useMemo(() => {
    if (!currentTable) return null;
    const t = tables.find(t => t.name === currentTable);
    return t ? t.schema : null;
  }, [tables, currentTable]);

  return html`
    <${Sidebar}
      tables=${tables}
      currentTable=${currentTable}
      viewMode=${viewMode}
      analyticsEnabled=${analyticsEnabled}
      observeEnabled=${observeEnabled}
      onSelect=${selectTable}
      onSelectAnalyticsVolume=${selectAnalyticsVolume}
      onSelectAnalyticsPerformance=${selectAnalyticsPerformance}
      onSelectObserve=${selectObserve}
      onBackup=${handleBackup}
      onRestore=${handleRestore}
      onLogout=${logout}
    />
    <div class="main">
      ${(viewMode === 'analytics-volume' || viewMode === 'analytics-performance') && analyticsEnabled
        ? html`<${AnalyticsPanel} page=${viewMode === 'analytics-performance' ? 'performance' : 'volume'} />`
        : viewMode === 'observe' && observeEnabled
        ? html`<${ObservePanel} />`
        : currentTable
        ? html`<${DataTable} key=${currentTable} tableName=${currentTable} schema=${currentSchema} onReload=${loadTables} sseSignal=${sseSignal} />`
        : html`<${EmptyState} />`
      }
    </div>
    <${Toasts} />
  `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body></html>

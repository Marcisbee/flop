<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flop Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1e1e2e;--bg2:#181825;--bg3:#313244;--text:#cdd6f4;--muted:#6c7086;--accent:#89b4fa;--accent2:#f38ba8;--border:#45475a;--surface:#11111b}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:15px;font-weight:600}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.user-info button{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.user-info button:hover{color:var(--text);border-color:var(--muted)}
.app{flex:1;display:flex;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.sidebar-header button{background:var(--accent);border:none;color:var(--surface);width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.docs{flex:1;overflow-y:auto;padding:4px 8px}
.doc-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-item:hover{background:var(--bg3);color:var(--text)}
.doc-item.active{background:var(--bg3);color:var(--text);font-weight:500}
.doc-item .doc-time{font-size:10px;color:var(--muted);margin-top:2px}
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-toolbar{padding:6px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.editor-toolbar input{background:none;border:none;color:var(--text);font-size:16px;font-weight:600;outline:none;flex:1;padding:4px 0}
.editor-toolbar input::placeholder{color:var(--muted)}
.cursors-bar{display:flex;gap:4px;align-items:center}
.cursor-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.cursor-label{font-size:10px;color:var(--muted);margin-right:4px}
.editor-wrap{flex:1;position:relative;overflow:hidden}
textarea{width:100%;height:100%;background:var(--bg);color:var(--text);border:none;padding:16px 20px;font-family:'SF Mono',Monaco,'Cascadia Code','Fira Code',monospace;font-size:14px;line-height:1.6;resize:none;outline:none;tab-size:2}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
.status-bar{padding:4px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;flex-shrink:0}
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10}
.auth-box{width:280px}
.auth-box h2{font-size:18px;margin-bottom:16px;text-align:center}
.auth-box input{width:100%;padding:8px 10px;margin-bottom:10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;outline:none}
.auth-box input:focus{border-color:var(--accent)}
.auth-box button{width:100%;padding:10px;background:var(--accent);border:none;color:var(--surface);border-radius:4px;cursor:pointer;font-size:14px;font-weight:500;margin-bottom:8px}
.auth-box .toggle{text-align:center;font-size:12px;color:var(--muted);cursor:pointer}
.auth-box .toggle:hover{color:var(--text)}
.auth-box .error{color:var(--accent2);font-size:12px;margin-bottom:8px;text-align:center}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2>Flop Editor</h2>
    <div id="auth-error" class="error" style="display:none"></div>
    <input id="auth-name" placeholder="Name" style="display:none">
    <input id="auth-email" placeholder="Email" type="email">
    <input id="auth-pass" placeholder="Password" type="password">
    <button id="auth-btn">Sign In</button>
    <div class="toggle" id="auth-toggle">Don't have an account? Register</div>
  </div>
</div>

<header>
  <h1>Flop Editor</h1>
  <div class="user-info">
    <span id="user-name"></span>
    <button id="logout-btn">Logout</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Documents</span>
      <button id="new-doc-btn" title="New Document">+</button>
    </div>
    <div class="docs" id="docs-list"></div>
  </div>
  <div class="editor-area" id="editor-area">
    <div class="empty">Select or create a document</div>
  </div>
</div>

<script type="module">
const API = '';
let TOKEN = localStorage.getItem('ed_token');
let USER = JSON.parse(localStorage.getItem('ed_user') || 'null');
const MY_COLOR = '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');

let currentDocId = null;
let docs = [];
let docEventSource = null;
let saveTimer = null;
let cursorTimer = null;
let lastSavedContent = '';

// ── Auth ──

async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const r = await fetch(API + path, { ...opts, headers });
  return r.json();
}

let isRegister = false;
document.getElementById('auth-toggle').onclick = () => {
  isRegister = !isRegister;
  document.getElementById('auth-name').style.display = isRegister ? '' : 'none';
  document.getElementById('auth-btn').textContent = isRegister ? 'Register' : 'Sign In';
  document.getElementById('auth-toggle').textContent = isRegister
    ? 'Already have an account? Sign In'
    : "Don't have an account? Register";
};

document.getElementById('auth-btn').onclick = async () => {
  const email = document.getElementById('auth-email').value;
  const password = document.getElementById('auth-pass').value;
  const name = document.getElementById('auth-name').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  try {
    const endpoint = isRegister ? '/api/auth/register' : '/api/auth/password';
    const body = isRegister ? { email, password, name } : { email, password };
    const r = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Auth failed');
    TOKEN = data.token;
    USER = data.user;
    localStorage.setItem('ed_token', TOKEN);
    localStorage.setItem('ed_user', JSON.stringify(USER));
    document.getElementById('auth-screen').style.display = 'none';
    init();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = '';
  }
};

document.getElementById('logout-btn').onclick = () => {
  TOKEN = null; USER = null;
  localStorage.removeItem('ed_token');
  localStorage.removeItem('ed_user');
  if (docEventSource) docEventSource.close();
  document.getElementById('auth-screen').style.display = 'flex';
};

// ── Document List ──

async function loadDocs() {
  const data = await apiFetch('/api/view/get_docs');
  docs = data.data || [];
  renderDocList();
}

function renderDocList() {
  const el = document.getElementById('docs-list');
  el.innerHTML = docs.map(d =>
    `<div class="doc-item${d.id === currentDocId ? ' active' : ''}" data-id="${d.id}">
      ${esc(d.title)}
      <div class="doc-time">${formatDate(d.updatedAt)}</div>
    </div>`
  ).join('');
  el.querySelectorAll('.doc-item').forEach(el => {
    el.onclick = () => openDoc(el.dataset.id);
  });
}

document.getElementById('new-doc-btn').onclick = async () => {
  const data = await apiFetch('/api/reduce/create_doc', {
    method: 'POST',
    body: JSON.stringify({ title: 'Untitled' }),
  });
  await loadDocs();
  if (data.data?.id) openDoc(data.data.id);
};

// ── Editor ──

function openDoc(docId) {
  currentDocId = docId;
  renderDocList();
  startDocSSE();
}

function startDocSSE() {
  if (docEventSource) docEventSource.close();

  const es = new EventSource(API + '/api/view/get_doc?docId=' + currentDocId);
  docEventSource = es;

  es.addEventListener('snapshot', (e) => {
    try { renderEditor(JSON.parse(e.data)); } catch {}
  });
  es.addEventListener('change', () => {
    apiFetch('/api/view/get_doc?docId=' + currentDocId).then(d => {
      if (d.data) renderEditor(d.data);
    }).catch(() => {});
  });
  es.onerror = () => { es.close(); setTimeout(() => { if (currentDocId) startDocSSE(); }, 3000); };
}

let editorMounted = false;

function renderEditor(doc) {
  const area = document.getElementById('editor-area');
  const textarea = document.getElementById('editor-textarea');

  if (!editorMounted || !textarea) {
    editorMounted = true;
    area.innerHTML = `
      <div class="editor-toolbar">
        <input id="doc-title" value="${esc(doc.title)}" placeholder="Document title">
        <div class="cursors-bar" id="cursors-bar"></div>
      </div>
      <div class="editor-wrap">
        <textarea id="editor-textarea" spellcheck="false">${esc(doc.content)}</textarea>
      </div>
      <div class="status-bar">
        <span id="status-text">Ready</span>
        <span id="char-count">${(doc.content || '').length} chars</span>
      </div>
    `;
    lastSavedContent = doc.content || '';

    const ta = document.getElementById('editor-textarea');
    ta.addEventListener('input', onTextInput);
    ta.addEventListener('click', onCursorMove);
    ta.addEventListener('keyup', onCursorMove);

    const titleInput = document.getElementById('doc-title');
    let renameTimer = null;
    titleInput.addEventListener('input', () => {
      clearTimeout(renameTimer);
      renameTimer = setTimeout(() => {
        apiFetch('/api/reduce/rename_doc', {
          method: 'POST',
          body: JSON.stringify({ docId: currentDocId, title: titleInput.value }),
        }).then(loadDocs);
      }, 500);
    });
  } else {
    // Update content only if user isn't actively editing
    if (document.activeElement !== textarea) {
      if (doc.content !== textarea.value) {
        const pos = textarea.selectionStart;
        textarea.value = doc.content || '';
        textarea.selectionStart = textarea.selectionEnd = Math.min(pos, textarea.value.length);
      }
    }
    lastSavedContent = doc.content || '';

    const titleInput = document.getElementById('doc-title');
    if (document.activeElement !== titleInput) {
      titleInput.value = doc.title;
    }
  }

  // Render remote cursors
  const cursorsBar = document.getElementById('cursors-bar');
  if (cursorsBar) {
    const remoteCursors = (doc.cursors || []).filter(c => c.userId !== USER?.id);
    cursorsBar.innerHTML = remoteCursors.map(c =>
      `<span class="cursor-label">${esc(c.userName)}</span><span class="cursor-dot" style="background:${c.color}"></span>`
    ).join('');
  }

  document.getElementById('char-count').textContent = (doc.content || '').length + ' chars';
}

function onTextInput() {
  clearTimeout(saveTimer);
  const content = document.getElementById('editor-textarea').value;
  document.getElementById('status-text').textContent = 'Editing...';
  document.getElementById('char-count').textContent = content.length + ' chars';

  saveTimer = setTimeout(async () => {
    if (content === lastSavedContent) return;
    await apiFetch('/api/reduce/update_doc', {
      method: 'POST',
      body: JSON.stringify({ docId: currentDocId, content }),
    });
    lastSavedContent = content;
    document.getElementById('status-text').textContent = 'Saved';
  }, 400);
}

function onCursorMove() {
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => {
    const ta = document.getElementById('editor-textarea');
    if (!ta) return;
    apiFetch('/api/reduce/update_cursor', {
      method: 'POST',
      body: JSON.stringify({ docId: currentDocId, position: ta.selectionStart, color: MY_COLOR }),
    });
  }, 300);
}

// ── Helpers ──

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

// ── Init ──

// SSE for doc list updates
let docsEventSource = null;
function startDocsSSE() {
  if (docsEventSource) docsEventSource.close();
  const es = new EventSource(API + '/api/view/get_docs');
  docsEventSource = es;
  es.addEventListener('snapshot', (e) => {
    try { docs = JSON.parse(e.data); renderDocList(); } catch {}
  });
  es.addEventListener('change', () => {
    apiFetch('/api/view/get_docs').then(d => {
      if (d.data) { docs = d.data; renderDocList(); }
    }).catch(() => {});
  });
  es.onerror = () => { es.close(); setTimeout(startDocsSSE, 3000); };
}

async function init() {
  document.getElementById('user-name').textContent = USER?.name || USER?.email || '';
  await loadDocs();
  startDocsSSE();
}

if (TOKEN && USER) {
  document.getElementById('auth-screen').style.display = 'none';
  init();
}
</script>
</body>
</html>

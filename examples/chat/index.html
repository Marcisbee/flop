<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flop Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--text:#e0e0e0;--muted:#888;--accent:#e94560;--accent2:#533483;--input-bg:#16213e;--border:#0f3460}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:600}
header .user-info{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
header button{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
header button:hover{color:var(--text);border-color:var(--muted)}
.app{flex:1;display:flex;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.sidebar-header button{background:var(--accent);border:none;color:#fff;width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.rooms{flex:1;overflow-y:auto;padding:4px 8px}
.room{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted)}
.room:hover{background:var(--bg3);color:var(--text)}
.room.active{background:var(--bg3);color:var(--text);font-weight:500}
.chat{flex:1;display:flex;flex-direction:column}
.chat-header{padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:500}
.messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px}
.msg{display:flex;gap:8px;padding:4px 0}
.msg-author{font-weight:600;font-size:13px;color:var(--accent);flex-shrink:0}
.msg-text{font-size:13px;line-height:1.4}
.msg-time{font-size:11px;color:var(--muted);flex-shrink:0;margin-top:1px}
.composer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.composer input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.composer input:focus{border-color:var(--accent)}
.composer button{background:var(--accent);border:none;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10}
.auth-box{width:300px}
.auth-box h2{font-size:18px;margin-bottom:16px;text-align:center}
.auth-box input{width:100%;padding:8px 10px;margin-bottom:10px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;outline:none}
.auth-box input:focus{border-color:var(--accent)}
.auth-box button{width:100%;padding:10px;background:var(--accent);border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:14px;font-weight:500;margin-bottom:8px}
.auth-box .toggle{text-align:center;font-size:12px;color:var(--muted);cursor:pointer}
.auth-box .toggle:hover{color:var(--text)}
.auth-box .error{color:var(--accent);font-size:12px;margin-bottom:8px;text-align:center}
dialog{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:20px}
dialog::backdrop{background:rgba(0,0,0,0.5)}
dialog input{width:100%;padding:8px;margin:8px 0;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;outline:none}
dialog button{padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-size:13px}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2>Flop Chat</h2>
    <div id="auth-error" class="error" style="display:none"></div>
    <input id="auth-name" placeholder="Name" style="display:none">
    <input id="auth-email" placeholder="Email" type="email">
    <input id="auth-pass" placeholder="Password" type="password">
    <button id="auth-btn">Sign In</button>
    <div class="toggle" id="auth-toggle">Don't have an account? Register</div>
  </div>
</div>

<header>
  <h1>Flop Chat</h1>
  <div class="user-info">
    <span id="user-name"></span>
    <button id="logout-btn">Logout</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Rooms</span>
      <button id="new-room-btn" title="New Room">+</button>
    </div>
    <div class="rooms" id="rooms"></div>
  </div>
  <div class="chat" id="chat">
    <div class="empty">Select a room to start chatting</div>
  </div>
</div>

<dialog id="room-dialog">
  <div style="font-size:14px;font-weight:500;margin-bottom:4px">New Room</div>
  <input id="room-name-input" placeholder="Room name">
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button style="background:var(--border);color:var(--text)" id="room-cancel">Cancel</button>
    <button style="background:var(--accent);color:#fff" id="room-create">Create</button>
  </div>
</dialog>

<script type="module">
const API = '';
let TOKEN = localStorage.getItem('chat_token');
let USER = JSON.parse(localStorage.getItem('chat_user') || 'null');
let currentRoom = null;
let rooms = [];

// ── Auth ──

async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const r = await fetch(API + path, { ...opts, headers });
  return r.json();
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
}
function hideAuth() {
  document.getElementById('auth-screen').style.display = 'none';
}

let isRegister = false;
document.getElementById('auth-toggle').onclick = () => {
  isRegister = !isRegister;
  document.getElementById('auth-name').style.display = isRegister ? '' : 'none';
  document.getElementById('auth-btn').textContent = isRegister ? 'Register' : 'Sign In';
  document.getElementById('auth-toggle').textContent = isRegister
    ? 'Already have an account? Sign In'
    : "Don't have an account? Register";
};

document.getElementById('auth-btn').onclick = async () => {
  const email = document.getElementById('auth-email').value;
  const password = document.getElementById('auth-pass').value;
  const name = document.getElementById('auth-name').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';

  try {
    if (isRegister) {
      const r = await fetch(API + '/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, name }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Registration failed');
      TOKEN = data.token;
      USER = data.user;
    } else {
      const r = await fetch(API + '/api/auth/password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Login failed');
      TOKEN = data.token;
      USER = data.user;
    }
    localStorage.setItem('chat_token', TOKEN);
    localStorage.setItem('chat_user', JSON.stringify(USER));
    hideAuth();
    init();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = '';
  }
};

document.getElementById('logout-btn').onclick = () => {
  TOKEN = null;
  USER = null;
  localStorage.removeItem('chat_token');
  localStorage.removeItem('chat_user');
  if (roomsEventSource) roomsEventSource.close();
  if (eventSource) eventSource.close();
  showAuth();
};

// ── Rooms ──

async function loadRooms() {
  const data = await apiFetch('/api/view/get_rooms');
  rooms = (data.data || []).sort((a, b) => a.createdAt - b.createdAt);
  renderRooms();
}

function renderRooms() {
  const el = document.getElementById('rooms');
  el.innerHTML = rooms.map(r =>
    `<div class="room${r.id === currentRoom ? ' active' : ''}" data-id="${r.id}">${r.name}</div>`
  ).join('');
  el.querySelectorAll('.room').forEach(el => {
    el.onclick = () => selectRoom(el.dataset.id);
  });
}

document.getElementById('new-room-btn').onclick = () => {
  document.getElementById('room-dialog').showModal();
  document.getElementById('room-name-input').value = '';
  document.getElementById('room-name-input').focus();
};
document.getElementById('room-cancel').onclick = () => {
  document.getElementById('room-dialog').close();
};
document.getElementById('room-create').onclick = async () => {
  const name = document.getElementById('room-name-input').value.trim();
  if (!name) return;
  await apiFetch('/api/reduce/create_room', { method: 'POST', body: JSON.stringify({ name }) });
  document.getElementById('room-dialog').close();
  await loadRooms();
};

// ── Messages ──

function selectRoom(roomId) {
  currentRoom = roomId;
  renderRooms();
  loadMessages();
  startSSE();
}

let eventSource = null;

function startSSE() {
  if (eventSource) eventSource.close();

  const url = API + '/api/view/get_messages?roomId=' + currentRoom;
  eventSource = new EventSource(url);

  eventSource.addEventListener('snapshot', (e) => {
    try {
      const msgs = JSON.parse(e.data);
      renderMessages(msgs);
    } catch {}
  });

  eventSource.addEventListener('change', (e) => {
    try {
      const evt = JSON.parse(e.data);
      if (evt.data && evt.data.roomId && evt.data.roomId !== currentRoom) return;
    } catch {}
    loadMessages();
  });

  eventSource.onerror = () => {
    eventSource.close();
    setTimeout(() => { if (currentRoom) startSSE(); }, 3000);
  };
}

async function loadMessages() {
  const data = await apiFetch('/api/view/get_messages?roomId=' + currentRoom);
  renderMessages(data.data || []);
}

function renderMessages(msgs) {
  const room = rooms.find(r => r.id === currentRoom);
  const chatEl = document.getElementById('chat');
  chatEl.innerHTML = `
    <div class="chat-header"># ${room ? room.name : currentRoom}</div>
    <div class="messages" id="msg-list">
      ${msgs.map(m => `
        <div class="msg">
          <span class="msg-author">${esc(m.authorName)}</span>
          <span class="msg-text">${esc(m.text)}</span>
          <span class="msg-time">${formatTime(m.createdAt)}</span>
        </div>
      `).join('')}
    </div>
    <div class="composer">
      <input id="msg-input" placeholder="Type a message..." autocomplete="off">
      <button id="msg-send">Send</button>
    </div>
  `;
  const list = document.getElementById('msg-list');
  list.scrollTop = list.scrollHeight;
  document.getElementById('msg-input').focus();
  document.getElementById('msg-send').onclick = sendMessage;
  document.getElementById('msg-input').onkeydown = (e) => {
    if (e.key === 'Enter') sendMessage();
  };
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  await apiFetch('/api/reduce/send_message', {
    method: 'POST',
    body: JSON.stringify({ roomId: currentRoom, text }),
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── Rooms SSE ──

let roomsEventSource = null;
function startRoomsSSE() {
  if (roomsEventSource) roomsEventSource.close();
  const es = new EventSource(API + '/api/view/get_rooms');
  roomsEventSource = es;
  es.addEventListener('snapshot', (e) => {
    try {
      rooms = JSON.parse(e.data).sort((a, b) => a.createdAt - b.createdAt);
      renderRooms();
    } catch {}
  });
  es.addEventListener('change', () => { loadRooms(); });
  es.onerror = () => { es.close(); setTimeout(startRoomsSSE, 3000); };
}

// ── Init ──

async function init() {
  document.getElementById('user-name').textContent = USER?.name || USER?.email || '';
  await loadRooms();
  startRoomsSSE();
}

if (TOKEN && USER) {
  hideAuth();
  init();
} else {
  showAuth();
}
</script>
</body>
</html>
